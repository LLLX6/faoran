function renderSearch(){ const filters=S.search||{}; const providers=filterProviders(filters); const open=S.filtersOpen||isAdvanced(); const chipLimit=isAdvanced()?12:6; return `<div class="section-head"><div><h2>${tr('search')}</h2><p>${providers.length} مزود مطابق، والفلاتر مخفية لتقليل التشويش.</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="panel"><div class="search-compact"><input class="input" id="fQuery" value="${esc(filters.q||'')}" placeholder="${tr('searchPlaceholder')}"><button class="pill-btn primary" data-action="applySearch">${icon('search')} ${tr('search')}</button><button class="ghost-btn" data-action="toggleFilters">${icon('filter')} ${open?'إخفاء التصفية':'تصفية'}</button></div>${renderRecentSearches()}${open?`<div class="filters quiet-filters"><select class="select" id="fCat"><option value="">${tr('all')}</option>${S.categories.filter(c=>c.active).map(c=>`<option value="${c.id}" ${filters.cat===c.id?'selected':''}>${esc(loc(c))}</option>`).join('')}</select><select class="select" id="fGov"><option value="">${tr('all')}</option>${govOptions(filters.gov)}</select><select class="select" id="fStatus"><option value="">${tr('status')}</option><option value="available" ${filters.status==='available'?'selected':''}>${tr('available')}</option><option value="busy" ${filters.status==='busy'?'selected':''}>${tr('busy')}</option><option value="unavailable" ${filters.status==='unavailable'?'selected':''}>${tr('unavailable')}</option></select><select class="select" id="fSort"><option value="rating" ${filters.sort==='rating'?'selected':''}>الأفضل جودة</option><option value="featured" ${filters.sort==='featured'?'selected':''}>${tr('featured')}</option><option value="price" ${filters.sort==='price'?'selected':''}>${tr('priceFrom')}</option></select></div>`:''}<div class="section-tabs">${S.categories.filter(c=>c.active).slice(0,chipLimit).map(c=>`<button class="chip-tab ${filters.cat===c.id?'active':''}" data-action="category" data-cat="${c.id}">${icon(catIconName(c.id))}${esc(loc(c))}</button>`).join('')}</div></div><div style="height:14px"></div>${providers.length?`<div class="listing-feed">${providers.map(providerCard).join('')}</div>`:`<div class="empty">${tr('noResults')}</div>`}`; }
function filterProviders(f={}){ let list=visibleProviders(); const q=String(f.q||'').trim().toLowerCase(); if(q){ list=list.filter(p=>{ const hay=[p.name,p.gov,p.wilayah,p.bio,...(p.areas||[])].join(' ').toLowerCase(); const sv=(p.services||[]).map(x=>loc(getSvc(x.catId,x.serviceId))).join(' ').toLowerCase(); return hay.includes(q)||sv.includes(q); }); } if(f.cat) list=list.filter(p=>(p.services||[]).some(s=>s.active&&s.catId===f.cat)); if(f.service) list=list.filter(p=>(p.services||[]).some(s=>s.active&&s.serviceId===f.service)); if(f.gov) list=list.filter(p=>p.gov===f.gov); if(f.status) list=list.filter(p=>p.status===f.status); if(f.sort==='price') list.sort((a,b)=>(providerPrimaryService(a)?.priceFrom||999)-(providerPrimaryService(b)?.priceFrom||999)); else if(f.sort==='featured') list.sort((a,b)=>(b.featured?1:0)-(a.featured?1:0)||(b.qualityScore||0)-(a.qualityScore||0)||(b.rating||0)-(a.rating||0)); else list.sort((a,b)=>(b.qualityScore||profileStrength(b))-(a.qualityScore||profileStrength(a))||(b.rating||0)-(a.rating||0)); return list; }
function renderFavorites(){ const favs=visibleProviders().filter(p=>S.favorites.includes(p.id)); return `<div class="section-head"><div><h2>${tr('favorites')}</h2><p>${tr('featuredProviders')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div>${favs.length?`<div class="listing-feed">${favs.map(providerCard).join('')}</div>`:`<div class="empty">${tr('emptyFav')}</div>`}`; }
function requestCard(r, compact=false){ const suggestions=smartProviderSuggestions(r); return `<article class="request-card"><div class="row-actions" style="justify-content:space-between"><h3>${esc(r.serviceName||'طلب خدمة')}</h3><span class="request-status">${icon('bell')} ${requestLabel(r.status)}</span></div>${requestSteps(r.status)}<p class="muted" style="margin:0;line-height:1.7">${esc(r.note||'')}</p><div class="listing-meta"><span>${esc(r.gov||'عُمان')}</span><span>•</span><span>${esc(new Date(r.createdAt||Date.now()).toLocaleDateString('ar-OM'))}</span><span>•</span><span>${esc(r.phone||'')}</span></div>${!compact&&suggestions.length?`<div class="suggest-row">${suggestions.map(p=>`<button class="suggest-chip" data-action="providerDetails" data-id="${p.id}">${esc(p.name)}</button>`).join('')}</div>`:''}<div class="row-actions"><button class="ghost-btn tiny" data-action="repeatRequest" data-id="${r.id}">${icon('chat')} إعادة الطلب</button><button class="ghost-btn tiny" data-action="cancelRequest" data-id="${r.id}">إلغاء</button></div></article>`; }
function renderRequestsSection(){ const requests=(S.customerRequests||[]).slice(0,5); return `<section class="account-section"><h3>طلباتي</h3>${requests.length?`<div class="list">${requests.map(r=>requestCard(r,true)).join('')}</div>`:`<div class="empty">لم ترسل أي طلب بعد. استخدم زر الطلب لإرسال احتياجك للإدارة.</div>`}<button class="menu-row" data-action="quickRequestForm"><span class="icon-chip">${icon('plus')}</span><b>طلب خدمة جديد</b><span>‹</span></button></section>`; }
function renderAccount(){
 const providerRow=boolUi('showProviderShortcut',true)?`<button class="menu-row" data-action="openProviderAccess"><span class="icon-chip">${icon('plus')}</span><b>انضم كمزود</b><span>‹</span></button>`:'';
 return `<div class="section-head"><div><h2>${tr('accountTitle')}</h2><p>حسابك، مفضلتك، طلباتك، وإعدادات التطبيق.</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="panel"><div class="quality-row">${avatarHtml({name:S.user.name||'مستخدم',avatar:initials(S.user.name||'مستخدم')})}<div><h2 style="margin:0">${esc(S.user.name||'زائر فوراً')}</h2><p class="muted" style="margin:4px 0">${esc(S.user.phone||'أضف رقمك لحفظ الطلبات')}</p></div></div><div class="two-col" style="margin-top:14px"><div class="field"><label>${tr('userName')}</label><input class="input" id="userName" value="${esc(S.user.name)}"></div><div class="field"><label>${tr('phone')}</label><input class="input" id="userPhone" value="${esc(S.user.phone)}"></div><div class="field"><label>${tr('governorate')}</label><select class="select" id="userGov">${govOptions(S.user.gov)}</select></div><div class="field"><label>${tr('wilayah')}</label><select class="select" id="userWilayah">${wilOptions(S.user.gov,S.user.wilayah)}</select></div></div><div style="margin-top:14px"><button class="pill-btn primary" data-action="saveUser">${tr('saveAccount')}</button></div></div><div class="account-menu" style="margin-top:14px">${renderRequestsSection()}<section class="account-section"><h3>شخصي</h3><button class="menu-row" data-action="nav" data-view="favorites"><span class="icon-chip">${icon('heart')}</span><b>${tr('favorites')}</b><span>‹</span></button>${providerRow}<button class="menu-row" data-action="quickRequestForm"><span class="icon-chip">${icon('chat')}</span><b>أرسل طلبك مرة واحدة</b><span>‹</span></button></section><section class="account-section"><h3>التفضيلات</h3><button class="menu-row" data-action="toggleUiMode"><span class="icon-chip">${icon(uiMode()==='advanced'?'settings':'shield')}</span><b>وضع الواجهة</b><span class="muted">${uiMode()==='advanced'?'متقدم':'بسيط'}</span></button><button class="menu-row" data-action="toggleTheme"><span class="icon-chip">${icon('sparkle')}</span><b>تبديل الوضع الفاتح/الداكن</b><span>‹</span></button><button class="menu-row" data-action="toggleLang"><span class="icon-chip">🌐</span><b>${tr('lang')}</b><span>‹</span></button><button class="menu-row"><span class="icon-chip">${icon('bell')}</span><b>الإشعارات</b><span class="muted">من الحساب</span></button></section><section class="account-section"><h3>المساعدة والدعم</h3><button class="menu-row" data-action="nav" data-view="help"><span class="icon-chip">${icon('chat')}</span><b>تواصل معنا</b><span>‹</span></button><button class="menu-row"><span class="icon-chip">${icon('shield')}</span><b>سياسة الجودة والخصوصية</b><span>‹</span></button></section><section class="account-section"><h3>المزيد</h3><button class="menu-row admin-soft-link" data-action="openAdminLogin"><span class="icon-chip">${icon('settings')}</span><b>إدارة التطبيق</b><span>‹</span></button><button class="menu-row danger"><span class="icon-chip">${icon('user')}</span><b>حذف الحساب</b><span>‹</span></button></section></div>`;
}
function renderHelp(){ return `<div class="section-head"><div><h2>${tr('aboutTitle')}</h2><p>${tr('supportText')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="panel"><p class="muted" style="line-height:1.9">${tr('supportText')}</p></div>`; }
function providerReviews(id){ return (S.reviews||[]).filter(r=>r.provider_id===id||r.providerId===id).slice(0,4); }
function openProviderDetails(id){
 const p=getProvider(id); if(!p){toast(tr('providerNotFound'));return;}
 incStat(id,'views');
 const ps=providerPrimaryService(p), cat=getCat(ps?.catId), svc=getSvc(ps?.catId,ps?.serviceId);
 const q=p.qualityScore??profileStrength(p);
 const questions=['qAvailable','qPrice','qNearest','qCoverage','qBook','qPhoto'];
 const reviews=providerReviews(id);
  openModal(`<div class="modal sheet"><div class="modal-head"><div class="modal-title">${esc(p.name)}</div><button class="close-btn" data-action="closeModal">×</button></div><div class="modal-body"><div class="quality-row">${avatarHtml(p)}<div><h2 style="margin:0 0 6px">${esc(p.name)} ${p.verified?'✓':''}</h2><div class="pc-meta"><span>${esc(loc(cat))}</span><span>•</span><span>${esc(loc(svc))}</span><span>•</span><span>${esc(p.wilayah)}</span><span>•</span><span>⭐ ${p.rating||0} (${p.reviews||0})</span></div><div style="margin-top:8px">${statusBadge(p.status)} ${p.featured?'<span class="badge warn">مميز</span>':''}</div></div></div><div style="height:16px"></div><div class="three-col"><div class="card"><div class="score-ring" style="--score:${q}"><span>${q}%</span></div><b>درجة الجودة</b><div class="muted">تحسب من اكتمال الملف والتقييمات والشكاوى</div></div><div class="card"><b>${tr('coverage')}</b><div class="muted">${esc((p.areas||[]).join('، ')||'-')}</div></div><div class="card"><b>${tr('workingHours')}</b><div class="muted">${esc(p.hours||'-')}</div></div></div><p class="muted" style="line-height:1.8">${esc(p.bio||'')}</p>${workGallery(p)}<div class="three-col"><div class="card"><b>${tr('priceFrom')}</b><div class="muted">${ps?.priceFrom?money(ps.priceFrom)+' ر.ع':'-'}</div></div><div class="card"><b>الأعمال</b><div class="muted">${(p.workImages||[]).length}/5 صور</div></div><div class="card"><b>الباقة</b><div class="muted">${esc(loc(S.packages.find(x=>x.id===p.packageId))||p.packageId||'-')}</div></div></div><div class="section-head"><div><h2>تقييمات العملاء</h2><p>${reviews.length?`${reviews.length} تقييمات ظاهرة`:'كن أول من يقيّم هذا المزود'}</p></div><button class="ghost-btn tiny" data-action="reviewForm" data-id="${p.id}">أضف تقييم</button></div><div class="review-list">${reviews.map(r=>`<div class="review-item"><b>${'★'.repeat(Number(r.rating||0))}</b><div class="muted">${esc(r.customer_name||r.customerName||'عميل')}</div><p>${esc(r.comment||'')}</p></div>`).join('')||`<div class="empty">لا توجد تقييمات بعد</div>`}</div><div class="section-head"><div><h2>${tr('quickQuestions')}</h2></div></div><div class="quick-grid grid">${questions.map(qn=>`<button class="tile" data-action="askWhatsapp" data-id="${p.id}" data-q="${qn}"><span class="tile-icon">${icon(qn==='qBook'?'bell':qn==='qPhoto'?'star':qn==='qPrice'?'wallet':qn==='qNearest'?'map':'chat')}</span><span class="tile-title">${tr(qn)}</span></button>`).join('')}</div><div style="height:14px"></div><div class="row-actions"><button class="pill-btn accent" data-action="directWhatsapp" data-id="${p.id}">${tr('whatsapp')}</button><button class="pill-btn" data-action="directCall" data-id="${p.id}">${tr('call')}</button><button class="pill-btn" data-action="bookingForm" data-id="${p.id}">${tr('bookTime')}</button><button class="pill-btn" data-action="shareProvider" data-id="${p.id}">${icon('sparkle')} مشاركة</button><button class="pill-btn" data-action="fav" data-id="${p.id}">${isFav(p.id)?'♥':'♡'} ${tr('favorites')}</button><button class="pill-btn warn" data-action="complaintForm" data-id="${p.id}">شكوى</button></div></div></div>`);
}
function bookingForm(id){ const p=getProvider(id); if(!p)return; openModal(`<div class="modal"><div class="modal-head"><div class="modal-title">${tr('bookingTitle')}</div><button class="close-btn" data-action="closeModal">×</button></div><div class="modal-body"><div class="two-col"><div class="field"><label>${tr('customerName')}</label><input class="input" id="bName" value="${esc(S.user.name||'')}"></div><div class="field"><label>${tr('wilayah')}</label><input class="input" id="bWilayah" value="${esc(S.user.wilayah||'')}"></div><div class="field"><label>${tr('date')}</label><input class="input" id="bDate" type="date"></div><div class="field"><label>${tr('time')}</label><input class="input" id="bTime" type="time"></div></div><div class="field" style="margin-top:12px"><label>${tr('requestDetails')}</label><textarea class="textarea" id="bDetails"></textarea></div><div style="margin-top:14px"><button class="pill-btn accent" data-action="sendBookingWhatsapp" data-id="${p.id}">${tr('sendWhatsapp')}</button></div></div></div>`); }
function quickRequestForm(){ openModal(`<div class="modal"><div class="modal-head"><div class="modal-title">طلب خدمة سريع</div><button class="close-btn" data-action="closeModal">×</button></div><div class="modal-body"><div class="wizard-steps">${[1,2,3,4].map(i=>`<span class="wizard-dot done"></span>`).join('')}</div><div class="notice-box">اكتب طلبك مرة واحدة، وسيظهر في حسابك مع حالة متابعة واضحة.</div><div class="two-col" style="margin-top:12px"><div class="field"><label>${tr('customerName')}</label><input class="input" id="qrName" value="${esc(S.user.name||'')}"></div><div class="field"><label>${tr('phone')}</label><input class="input" id="qrPhone" inputmode="tel" value="${esc(S.user.phone||'')}"></div><div class="field"><label>${tr('governorate')}</label><select class="select" id="qrGov">${govOptions(S.user.gov||'مسقط')}</select></div><div class="field"><label>${tr('service')}</label><select class="select" id="qrService">${allServicesOptions()}</select></div><div class="field"><label>وقت مناسب</label><input class="input" id="qrDate" type="datetime-local"></div><div class="field"><label>طريقة المتابعة</label><select class="select" id="qrMode"><option value="quotes">أريد عروض أسعار</option><option value="direct">أريد ترشيح مزود مباشر</option><option value="urgent">مستعجل اليوم</option></select></div><div class="field"><label>صورة المشكلة</label><input class="input" id="qrImage" type="file" accept="image/*"><span class="upload-hint">اختياري، تحفظ في جهازك ضمن الطلب</span></div></div><div class="field" style="margin-top:12px"><label>${tr('requestDetails')}</label><textarea class="textarea" id="qrNote" placeholder="مثال: أحتاج كهربائي اليوم في السيب، المشكلة في القاطع..."></textarea></div><button class="pill-btn primary" data-action="saveQuickRequest" style="width:100%;margin-top:14px">${icon('chat')} إرسال الطلب</button></div></div>`); }
function openWhatsAppQuestion(id,qkey){ const p=getProvider(id); if(!p)return; incStat(id,'whatsapp'); const msg = S.lang==='ar' ? `مرحبًا ${p.name}\n${tr(qkey)}\nالخدمة: ${loc(getSvc(providerPrimaryService(p)?.catId,providerPrimaryService(p)?.serviceId))}` : `Hello ${p.name}\n${tr(qkey)}\nService: ${loc(getSvc(providerPrimaryService(p)?.catId,providerPrimaryService(p)?.serviceId))}`; window.open(waUrl(p.phone,msg),'_blank'); }
function sendBookingWhatsapp(id){ const p=getProvider(id); if(!p)return; const msg = S.lang==='ar' ? `مرحبًا ${p.name}\nأرغب في ترتيب موعد.\nالاسم: ${val('bName')}\nالولاية: ${val('bWilayah')}\nالتاريخ: ${val('bDate')}\nالوقت: ${val('bTime')}\nالوصف: ${val('bDetails')}` : `Hello ${p.name}\nI would like to arrange an appointment.\nName: ${val('bName')}\nArea: ${val('bWilayah')}\nDate: ${val('bDate')}\nTime: ${val('bTime')}\nDetails: ${val('bDetails')}`; incStat(id,'whatsapp'); window.open(waUrl(p.phone,msg),'_blank'); closeModal(); }
function renderProviderApp(){ const p = S.currentProviderId ? getProvider(S.currentProviderId) : null; const tabs=['home','profile','services','availability','leads','subscription','performance','support']; if(!p) return layout(`<div class="provider-shell"><div class="section-head"><div><h2>${tr('providerAccess')}</h2><p>${tr('providerLogin')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="panel"><button class="pill-btn primary" data-action="openProviderAccess">${tr('providerLogin')}</button></div></div>`,{noBottom:true}); return `<div class="topbar"><div class="container topbar-inner"><button class="brand" data-action="nav" data-view="provider" style="border:0;background:transparent">${logoMark()}<span>${tr('provider')}</span></button><div class="top-actions"><button class="icon-btn" data-action="toggleLang">🌐</button><button class="pill-btn" data-action="providerLogout">${tr('back')}</button></div></div></div><main class="container provider-shell"><div class="side-layout"><aside class="side-nav">${tabs.map(t=>`<button data-action="providerTab" data-tab="${t}" class="${S.providerTab===t?'active':''}">${tabIcon(t)} ${tr('provider'+cap(t))}</button>`).join('')}</aside><section>${renderProviderTab(p)}</section></div></main>`; }
function tabIcon(t){ return ({home:icon('home'),profile:icon('user'),services:icon('grid'),availability:icon('bell'),leads:icon('chat'),subscription:icon('wallet'),performance:icon('star'),support:icon('chat')})[t]||icon('sparkle'); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function renderProviderTab(p){ if(p.pending) return `<div class="panel"><h2>${tr('pendingReview')}</h2><p class="muted">${esc(p.name)}</p></div>`; const t=S.providerTab||'home'; if(t==='profile') return providerProfile(p); if(t==='services') return providerServices(p); if(t==='availability') return providerAvailability(p); if(t==='leads') return providerLeads(p); if(t==='subscription') return providerSubscription(p); if(t==='performance') return providerPerformance(p); if(t==='support') return providerSupport(p); return providerHome(p); }
function providerHome(p){ const q=p.qualityScore??profileStrength(p); const open=(S.complaints||[]).filter(c=>(c.provider_id===p.id||c.providerId===p.id)&&c.status!=='closed').length; return `<div class="section-head"><div><h2>${esc(p.name)}</h2><p>${tr('providerHome')}</p></div>${statusBadge(p.status)}</div><div class="admin-grid grid"><div class="card mini-stat"><span>${tr('views')}</span><b>${p.stats?.views||0}</b></div><div class="card mini-stat"><span>${tr('whatsappOpens')}</span><b>${p.stats?.whatsapp||0}</b></div><div class="card mini-stat"><span>${tr('calls')}</span><b>${p.stats?.calls||0}</b></div><div class="card mini-stat"><span>درجة الجودة</span><b>${q}%</b><div class="progress"><i style="width:${q}%"></i></div></div></div><div class="panel" style="margin-top:14px"><div class="three-col"><div class="card"><b>الشكاوى المفتوحة</b><div class="muted">${open}</div></div><div class="card"><b>صور الأعمال</b><div class="muted">${(p.workImages||[]).length}/5</div></div><div class="card"><b>الاشتراك</b><div class="muted">${esc(p.subscriptionEnd||'غير محدد')}</div></div></div></div>`; }
function providerProfile(p){ return `<div class="panel"><h2>${tr('providerProfile')}</h2><div class="two-col"><div class="field"><label>${tr('fullName')}</label><input class="input" id="ppName" value="${esc(p.name)}"></div><div class="field"><label>${tr('phone')}</label><input class="input" id="ppPhone" value="${esc(p.phone)}"></div><div class="field"><label>${tr('governorate')}</label><select class="select" id="ppGov">${govOptions(p.gov)}</select></div><div class="field"><label>${tr('wilayah')}</label><select class="select" id="ppWilayah">${wilOptions(p.gov,p.wilayah)}</select></div><div class="field"><label>${tr('workingHours')}</label><input class="input" id="ppHours" value="${esc(p.hours||'')}"></div><div class="field"><label>${tr('coverage')}</label><input class="input" id="ppAreas" value="${esc((p.areas||[]).join('، '))}"></div><div class="field"><label>الصورة الشخصية</label><input class="input" id="ppAvatar" type="file" accept="image/*"><span class="upload-hint">اتركها فارغة إذا لا تريد التغيير</span></div><div class="field"><label>صور الأعمال</label><input class="input" id="ppWorkImages" type="file" accept="image/*" multiple><span class="upload-hint">حتى 5 صور</span></div><div class="field"><label>ملفات التوثيق</label><input class="input" id="ppDocs" type="file" accept="image/*,application/pdf" multiple><span class="upload-hint">رخصة، سجل، أو إثبات عمل PDF/صورة</span></div></div><div class="field" style="margin-top:12px"><label>${tr('description')}</label><textarea class="textarea" id="ppBio">${esc(p.bio||'')}</textarea></div>${workGallery(p)}<div class="mobile-safe-actions" style="margin-top:14px"><button class="pill-btn primary" data-action="saveProviderProfile">${tr('save')}</button></div></div>`; }
function providerServices(p){ return `<div class="section-head"><div><h2>${tr('providerServices')}</h2></div><button class="pill-btn primary" data-action="providerServiceForm">${tr('addService')}</button></div><div class="list">${(p.services||[]).map(s=>providerServiceItem(p,s)).join('')||`<div class="empty">${tr('noResults')}</div>`}</div>`; }
function providerServiceItem(p,s){ const cat=getCat(s.catId), svc=getSvc(s.catId,s.serviceId); return `<div class="list-item"><div><b>${esc(loc(svc))}</b><div class="muted">${esc(loc(cat))} • ${tr('priceFrom')} ${money(s.priceFrom||0)} ر.ع • ${s.active?tr('activate'):tr('stop')}</div></div><div class="row-actions"><button class="ghost-btn tiny" data-action="providerServiceForm" data-id="${s.id}">${tr('edit')}</button><button class="ghost-btn tiny" data-action="toggleProviderService" data-id="${s.id}">${s.active?tr('stop'):tr('activate')}</button><button class="ghost-btn tiny" data-action="deleteProviderService" data-id="${s.id}">${tr('delete')}</button></div></div>`; }
function providerAvailability(p){ return `<div class="panel"><h2>${tr('providerAvailability')}</h2><div class="row-actions"><button class="pill-btn ${p.status==='available'?'ok':''}" data-action="setProviderStatus" data-status="available">${tr('available')}</button><button class="pill-btn ${p.status==='busy'?'warn':''}" data-action="setProviderStatus" data-status="busy">${tr('busy')}</button><button class="pill-btn ${p.status==='unavailable'?'danger':''}" data-action="setProviderStatus" data-status="unavailable">${tr('unavailable')}</button></div><div class="field" style="margin-top:16px"><label>${tr('workingHours')}</label><input class="input" id="paHours" value="${esc(p.hours||'')}"></div><div style="margin-top:14px"><button class="pill-btn primary" data-action="saveProviderHours">${tr('save')}</button></div></div>`; }
function providerLeads(p){ const leads=(S.leads||[]).filter(l=>l.provider_id===p.id||l.providerId===p.id); return `<div class="section-head"><div><h2>طلبات العملاء</h2><p>التواصلات والطلبات التي وصلت لحسابك.</p></div></div><div class="admin-grid grid"><div class="card mini-stat"><span>الطلبات</span><b>${leads.length}</b></div><div class="card mini-stat"><span>واتساب</span><b>${leads.filter(x=>x.kind==='whatsapp').length}</b></div><div class="card mini-stat"><span>اتصالات</span><b>${leads.filter(x=>x.kind==='calls').length}</b></div><div class="card mini-stat"><span>مشاهدات</span><b>${p.stats?.views||0}</b></div></div><div class="panel" style="margin-top:14px"><div class="list">${leads.map(l=>`<div class="list-item"><div><b>${esc(l.customer_name||'عميل')}</b><div class="muted">${esc(l.phone||'')} • ${esc(l.kind||'request')} • ${esc(l.created_at||'')}</div><p>${esc(l.note||'')}</p></div><button class="ghost-btn tiny" data-action="copyLead" data-id="${l.id}">نسخ</button></div>`).join('')||'<div class="empty">لم تصل طلبات مباشرة بعد.</div>'}</div></div>`; }
function providerSubscription(p){ const pkg=S.packages.find(x=>x.id===p.packageId); const subs=(S.subscriptions||[]).filter(s=>s.providerId===p.id||s.provider_id===p.id); return `<div class="panel"><h2>${tr('providerSubscription')}</h2><div class="three-col"><div class="card"><b>${tr('package')}</b><div class="muted">${esc(loc(pkg)||'-')}</div></div><div class="card"><b>${tr('endDate')}</b><div class="muted">${esc(p.subscriptionEnd||'-')}</div></div><div class="card"><b>${tr('featured')}</b><div class="muted">${p.featured?tr('yes'):tr('no')}</div></div></div><div class="section-head"><div><h2>${tr('packages')}</h2><p>اختر الباقة المناسبة وسيصل طلبك للإدارة.</p></div></div><div class="three-col">${S.packages.map(pkg=>`<div class="card"><b>${esc(loc(pkg))}</b><p class="muted">${money(pkg.price)} ر.ع • ${pkg.duration||pkg.durationDays||30} يوم</p><button class="pill-btn primary tiny" data-action="requestPackage" data-id="${pkg.id}">${tr('requestUpgrade')}</button></div>`).join('')}</div><div class="panel" style="margin-top:14px"><h2>طلبات الاشتراك</h2><div class="list">${subs.map(s=>`<div class="list-item"><div><b>${esc(s.status)}</b><div class="muted">${esc(s.packageId||s.package_id)} • ${money(s.amount)} ر.ع • ${esc(s.endDate||s.end_date||'')}</div></div></div>`).join('')||'<div class="empty">لا توجد طلبات اشتراك بعد</div>'}</div></div></div>`; }
function providerPerformance(p){ const q=p.qualityScore??profileStrength(p); const reviews=providerReviews(p.id); return `<div class="admin-grid grid"><div class="card mini-stat"><span>${tr('views')}</span><b>${p.stats?.views||0}</b></div><div class="card mini-stat"><span>${tr('whatsappOpens')}</span><b>${p.stats?.whatsapp||0}</b></div><div class="card mini-stat"><span>${tr('calls')}</span><b>${p.stats?.calls||0}</b></div><div class="card mini-stat"><span>${tr('rating')}</span><b>${p.rating||0}</b></div></div><div class="panel" style="margin-top:14px"><h2>جودة الملف</h2><div class="quality-row"><div class="score-ring" style="--score:${q}"><span>${q}%</span></div><div><b>كلما ارتفعت الجودة زاد ظهورك في النتائج</b><p class="muted">أكمل الصور والأوقات ومناطق العمل وحافظ على التقييمات.</p></div></div></div><div class="panel" style="margin-top:14px"><h2>آخر التقييمات</h2><div class="review-list">${reviews.map(r=>`<div class="review-item"><b>${'★'.repeat(Number(r.rating||0))}</b><div class="muted">${esc(r.customer_name||r.customerName||'عميل')}</div><p>${esc(r.comment||'')}</p></div>`).join('')||'<div class="empty">لا توجد تقييمات بعد</div>'}</div></div>`; }
function providerSupport(p){ const complaints=(S.complaints||[]).filter(c=>c.provider_id===p.id||c.providerId===p.id); return `<div class="panel"><h2>${tr('providerSupport')}</h2><div class="field"><label>${tr('sendNote')}</label><textarea class="textarea" id="supportNote"></textarea></div><button class="pill-btn primary" data-action="sendProviderSupport" style="margin-top:14px">${tr('sendNote')}</button></div><div class="panel" style="margin-top:14px"><h2>الشكاوى والمتابعة</h2><div class="list">${complaints.map(c=>`<div class="list-item"><div><b>${esc(c.reason||'شكوى')}</b><div class="muted">${esc(c.status)} • ${esc(c.created_at||c.createdAt||'')}</div><p>${esc(c.detail||'')}</p></div></div>`).join('')||'<div class="empty">لا توجد شكاوى على حسابك</div>'}</div></div>`; }
function renderAdmin(){ const tabs=['overview','leads','providers','providerRequests','complaints','subscriptions','finance','reports','quality','categoryAdmin','settings','backup']; return `<div class="topbar"><div class="container topbar-inner"><button class="brand" style="border:0;background:transparent">${logoMark()}<span>${tr('adminPanel')}</span></button><div class="top-actions"><button class="icon-btn" data-action="toggleLang">🌐</button><button class="pill-btn" data-action="adminLogout">${tr('back')}</button></div></div></div><main class="container admin-shell"><div class="side-layout"><aside class="side-nav">${tabs.map(t=>`<button data-action="adminTab" data-tab="${t}" class="${S.adminTab===t?'active':''}">${adminIcon(t)} ${adminLabel(t)}</button>`).join('')}</aside><section>${renderAdminTab()}</section></div></main>`; }
function adminIcon(t){return ({overview:icon('star'),leads:icon('chat'),providers:icon('user'),providerRequests:icon('chat'),categoryAdmin:icon('grid'),finance:icon('wallet'),quality:icon('shield'),settings:icon('settings'),backup:icon('sparkle'),complaints:icon('bell'),subscriptions:icon('wallet'),reports:icon('search')})[t]||icon('sparkle')}
function adminLabel(t){ return ({leads:'طلبات العملاء',quality:'جودة التطبيق',complaints:'الشكاوى والجودة',subscriptions:'الاشتراكات',reports:'التقارير'})[t]||tr(t); }
function renderAdminTab(){ const t=S.adminTab||'overview'; if(t==='leads')return adminLeads(); if(t==='providers')return adminProviders(); if(t==='providerRequests')return adminRequests(); if(t==='complaints')return adminComplaints(); if(t==='subscriptions')return adminSubscriptions(); if(t==='reports')return adminReports(); if(t==='categoryAdmin')return adminCategories(); if(t==='finance')return adminFinance(); if(t==='quality')return adminQuality(); if(t==='settings')return adminSettings(); if(t==='backup')return adminBackup(); return adminOverview(); }
function adminOverview(){ const active=S.providers.filter(p=>p.active).length, stopped=S.providers.filter(p=>!p.active).length, services=S.categories.flatMap(c=>c.services).filter(s=>s.active).length; const st=S.serverStats||{}; return `<div class="section-head"><div><h2>${tr('overview')}</h2><p>لوحة تشغيل يومية للمزودين والجودة والربح.</p></div></div><div class="admin-grid grid"><div class="card mini-stat"><span>${tr('providers')}</span><b>${S.providers.length}</b></div><div class="card mini-stat"><span>${tr('activeProviders')}</span><b>${active}</b></div><div class="card mini-stat"><span>الشكاوى المفتوحة</span><b>${st.openComplaints??(S.complaints||[]).filter(c=>c.status!=='closed').length}</b></div><div class="card mini-stat"><span>متوسط الجودة</span><b>${st.qualityAverage??Math.round(S.providers.reduce((a,p)=>a+(p.qualityScore||profileStrength(p)),0)/(S.providers.length||1))}%</b></div></div><div class="admin-grid grid" style="margin-top:14px"><div class="card mini-stat"><span>${tr('activeServices')}</span><b>${services}</b></div><div class="card mini-stat"><span>${tr('revenues')}</span><b>${money(st.revenue||financeTotals().rev)} ر.ع</b></div><div class="card mini-stat"><span>تقييمات</span><b>${st.reviews??(S.reviews||[]).length}</b></div><div class="card mini-stat"><span>اشتراكات نشطة</span><b>${st.activeSubscriptions??(S.subscriptions||[]).filter(s=>s.status==='active').length}</b></div></div><div class="panel" style="margin-top:14px"><h2>${tr('mostRequested')}</h2><div class="category-grid grid">${S.categories.slice(0,4).map(catTile).join('')}</div></div>`; }
function adminLeads(){ const leads=(S.leads||[]); const customer=(S.customerRequests||[]); return `<div class="section-head"><div><h2>طلبات العملاء</h2><p>كل الطلبات والتواصلات القادمة من الموقع.</p></div><button class="pill-btn" data-action="exportLeadsCsv">${tr('exportCsv')}</button></div><div class="admin-grid grid"><div class="card mini-stat"><span>طلبات محفوظة</span><b>${leads.length}</b></div><div class="card mini-stat"><span>طلبات هذا الجهاز</span><b>${customer.length}</b></div><div class="card mini-stat"><span>واتساب</span><b>${leads.filter(x=>x.kind==='whatsapp').length}</b></div><div class="card mini-stat"><span>اتصالات</span><b>${leads.filter(x=>x.kind==='calls').length}</b></div></div><div class="panel" style="margin-top:14px"><h2>قائمة الطلبات</h2><div class="list">${leads.map(l=>`<div class="list-item"><div><b>${esc(l.customer_name||l.customerName||'عميل')}</b><div class="muted">${esc(l.phone||'')} • ${esc(l.kind||'request')} • ${esc(l.created_at||l.createdAt||'')}</div><p>${esc(l.note||'')}</p></div><div class="row-actions">${l.provider_id?`<button class="ghost-btn tiny" data-action="providerDetails" data-id="${l.provider_id}">المزود</button>`:''}<button class="ghost-btn tiny" data-action="copyLead" data-id="${l.id}">نسخ</button></div></div>`).join('')||'<div class="empty">لا توجد طلبات محفوظة بعد</div>'}</div></div>${customer.length?`<div class="panel" style="margin-top:14px"><h2>طلبات العميل المحلية</h2><div class="list">${customer.map(r=>requestCard(r,true)).join('')}</div></div>`:''}`; }
function adminQuality(){ const weak=S.providers.filter(p=>profileStrength(p)<75); const noImages=S.providers.filter(p=>!(p.workImages||[]).length); const noHours=S.providers.filter(p=>!p.hours); const pending=S.providerRequests.length; return `<div class="section-head"><div><h2>جودة التطبيق</h2><p>قائمة فحص سريعة لتحسين جاهزية المنصة.</p></div></div><div class="admin-grid grid"><div class="card mini-stat"><span>ملفات ضعيفة</span><b>${weak.length}</b></div><div class="card mini-stat"><span>بدون صور أعمال</span><b>${noImages.length}</b></div><div class="card mini-stat"><span>بدون أوقات عمل</span><b>${noHours.length}</b></div><div class="card mini-stat"><span>طلبات تنتظر</span><b>${pending}</b></div></div><div class="panel" style="margin-top:14px"><h2>إجراءات مقترحة</h2><div class="list">${[...new Set([...weak,...noImages,...noHours])].slice(0,8).map(p=>`<div class="list-item"><div><b>${esc(p.name)}</b><div class="muted">قوة الملف ${profileStrength(p)}% • صور الأعمال ${(p.workImages||[]).length}/5 • ${p.hours||'لا يوجد وقت عمل'}</div></div><button class="ghost-btn tiny" data-action="adminEditProvider" data-id="${p.id}">${tr('edit')}</button></div>`).join('')||`<div class="empty">كل الملفات الأساسية جيدة.</div>`}</div></div>`; }
function adminComplaints(){ const items=S.complaints||[]; return `<div class="section-head"><div><h2>الشكاوى والجودة</h2><p>متابعة البلاغات وإغلاقها يرفع جودة المنصة.</p></div></div><div class="admin-grid grid"><div class="card mini-stat"><span>مفتوحة</span><b>${items.filter(c=>c.status==='open').length}</b></div><div class="card mini-stat"><span>قيد المتابعة</span><b>${items.filter(c=>c.status==='reviewing').length}</b></div><div class="card mini-stat"><span>مغلقة</span><b>${items.filter(c=>c.status==='closed').length}</b></div><div class="card mini-stat"><span>عالية</span><b>${items.filter(c=>c.priority==='high').length}</b></div></div><div class="panel" style="margin-top:14px"><div class="list">${items.map(c=>{const p=getProvider(c.provider_id||c.providerId);return `<div class="list-item"><div><b>${esc(c.reason||'شكوى')} • ${esc(p?.name||'بدون مزود')}</b><div class="muted">${esc(c.customer_name||c.customerName||'عميل')} • ${esc(c.phone||'')} • ${esc(c.status)}</div><p>${esc(c.detail||'')}</p></div><div class="row-actions"><button class="ghost-btn tiny" data-action="complaintStatus" data-id="${c.id}" data-status="reviewing">متابعة</button><button class="ghost-btn tiny" data-action="complaintStatus" data-id="${c.id}" data-status="closed">إغلاق</button></div></div>`}).join('')||'<div class="empty">لا توجد شكاوى</div>'}</div></div>`; }
function adminSubscriptions(){ const subs=S.subscriptions||[]; return `<div class="section-head"><div><h2>الاشتراكات والباقات</h2><p>إدارة ربح المنصة وطلبات الترقية.</p></div><button class="pill-btn primary" data-action="newSubscriptionForm">إضافة اشتراك</button></div><div class="three-col">${S.packages.map(pkg=>`<div class="card"><b>${esc(loc(pkg))}</b><p class="muted">${money(pkg.price)} ر.ع • ${pkg.duration||pkg.durationDays||30} يوم</p><button class="ghost-btn tiny" data-action="packageForm" data-id="${pkg.id}">${tr('edit')}</button></div>`).join('')}</div><div class="panel" style="margin-top:14px"><h2>طلبات واشتراكات</h2><div class="list">${subs.map(s=>{const p=getProvider(s.providerId||s.provider_id);return `<div class="list-item"><div><b>${esc(p?.name||'مزود')} • ${esc(s.status)}</b><div class="muted">${esc(s.packageId||s.package_id)} • ${money(s.amount)} ر.ع • ${esc(s.startDate||s.start_date||'')} - ${esc(s.endDate||s.end_date||'')}</div><p>${esc(s.note||'')}</p></div><div class="row-actions"><button class="ghost-btn tiny" data-action="activateSubscription" data-id="${s.id}">تفعيل</button><button class="ghost-btn tiny" data-action="recordPaymentForSub" data-id="${s.id}">تسجيل دفع</button></div></div>`}).join('')||'<div class="empty">لا توجد اشتراكات بعد</div>'}</div></div>`; }
function adminReports(){ const top=(S.reports?.topProviders||S.providers).slice(0,8); const queue=S.reports?.qualityQueue||S.providers.filter(p=>(p.qualityScore||profileStrength(p))<65); return `<div class="section-head"><div><h2>التقارير</h2><p>قراءة تشغيلية سريعة للنمو والجودة.</p></div><button class="pill-btn" data-action="exportReportsCsv">${tr('exportCsv')}</button></div><div class="two-col"><div class="panel"><h2>أفضل المزودين</h2><div class="list">${top.map(p=>`<div class="list-item"><div><b>${esc(p.name)}</b><div class="muted">جودة ${p.qualityScore||0}% • تقييم ${p.rating||0} • واتساب ${p.stats?.whatsapp||0}</div></div></div>`).join('')}</div></div><div class="panel"><h2>قائمة تحسين الجودة</h2><div class="list">${queue.map(p=>`<div class="list-item"><div><b>${esc(p.name)}</b><div class="muted">جودة ${p.qualityScore||profileStrength(p)}% • تقييم ${p.rating||0}</div></div><button class="ghost-btn tiny" data-action="adminEditProvider" data-id="${p.id}">${tr('edit')}</button></div>`).join('')||'<div class="empty">لا توجد مشاكل جودة واضحة</div>'}</div></div></div><div class="panel" style="margin-top:14px"><h2>سجل الإدارة</h2><div class="timeline">${(S.auditLogs||[]).slice(0,20).map(a=>`<div class="list-item"><span class="icon-chip">•</span><div><b>${esc(a.action)}</b><div class="muted">${esc(a.actor_kind||'')} • ${esc(a.target||'')} • ${esc(a.created_at||'')}</div><p>${esc(a.detail||'')}</p></div></div>`).join('')||'<div class="empty">لا يوجد سجل عمليات بعد</div>'}</div></div>`; }
function adminProviders(){ return `<div class="section-head"><div><h2>${tr('manageProviders')}</h2></div></div><div class="list">${S.providers.map(p=>`<div class="list-item"><div><b>${esc(p.name)} ${p.verified?'✓':''}</b><div class="muted">${esc(p.wilayah)} • ${statusBadge(p.status)} • ${p.active?tr('activate'):tr('stop')}</div></div><div class="row-actions"><button class="ghost-btn tiny" data-action="adminEditProvider" data-id="${p.id}">${tr('edit')}</button><button class="ghost-btn tiny" data-action="adminToggleProvider" data-id="${p.id}">${p.active?tr('stop'):tr('activate')}</button><button class="ghost-btn tiny" data-action="adminVerifyProvider" data-id="${p.id}">${tr('verify')}</button><button class="ghost-btn tiny" data-action="adminDeleteProvider" data-id="${p.id}">${tr('delete')}</button></div></div>`).join('')}</div>`; }

function openModal(html){ document.getElementById('modalRoot').innerHTML=`<div class="modal-backdrop show" data-action="closeModalSoft">${html}</div>`; }
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }
function val(id){ return document.getElementById(id)?.value?.trim() || ''; }
function checked(id){ return !!document.getElementById(id)?.checked; }
function readImageFiles(id, limit=1){
 const input=document.getElementById(id), files=[...(input?.files||[])].slice(0,limit);
 return Promise.all(files.map(file=>new Promise(resolve=>{
  if(!file.type.startsWith('image/')) return resolve('');
  const r=new FileReader();
  r.onload=()=>resolve(r.result);
  r.onerror=()=>resolve('');
  r.readAsDataURL(file);
 }))).then(list=>list.filter(Boolean));
}
function readAnyFiles(id, limit=1){
 const input=document.getElementById(id), files=[...(input?.files||[])].slice(0,limit);
 return Promise.all(files.map(file=>new Promise(resolve=>{
  const ok=file.type.startsWith('image/') || file.type==='application/pdf';
  if(!ok) return resolve('');
  const r=new FileReader();
  r.onload=()=>resolve(r.result);
  r.onerror=()=>resolve('');
  r.readAsDataURL(file);
 }))).then(list=>list.filter(Boolean));
}
