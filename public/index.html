function localizeStaticDom(){
 if(S.lang !== 'en') return;
 const walker=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,{acceptNode:n=>n.parentElement?.closest('script,style')?NodeFilter.FILTER_REJECT:NodeFilter.FILTER_ACCEPT});
 const nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
 nodes.forEach(n=>{ const raw=n.nodeValue, key=raw.trim(); if(UI_EN[key]) n.nodeValue=raw.replace(key,UI_EN[key]); });
 document.querySelectorAll('[placeholder],[title]').forEach(el=>['placeholder','title'].forEach(attr=>{ const v=el.getAttribute(attr); if(v&&UI_EN[v.trim()]) el.setAttribute(attr, UI_EN[v.trim()]); }));
}
function mergeCategoryCatalog(existing=[]){
 const current=(existing||[]).map(c=>({...c,services:[...(c.services||[])]}));
 const byCat=new Map(current.map(c=>[c.id,c]));
 [...seedCategories(),...expandedMarketCategories()].forEach(seed=>{
  const cat=byCat.get(seed.id);
  if(!cat){ current.push(seed); byCat.set(seed.id,seed); return; }
  cat.icon=cat.icon||seed.icon; cat.ar=cat.ar||seed.ar; cat.en=cat.en||seed.en; if(typeof cat.active==='undefined')cat.active=true;
  const bySvc=new Map((cat.services||[]).map(s=>[s.id,s]));
  seed.services.forEach(s=>{ if(!bySvc.has(s.id)) cat.services.push(s); });
 });
 return current;
}
function mergePackages(existing=[]){
 const current=(existing||[]).map(p=>({...p,duration:p.durationDays||p.duration||30,durationDays:p.durationDays||p.duration||30,active:p.active!==false}));
 const byId=new Map(current.map(p=>[p.id,p]));
 return seedPackages().map(seed=>{

  return {...seed,...old,id:seed.id,duration:old.durationDays||old.duration||seed.duration,durationDays:old.durationDays||old.duration||seed.duration,active:true};
 });

function mergeSeedProviders(existing=[]){
 const current=(existing||[]).map(p=>({...p,services:[...(p.services||[])],stats:{...(p.stats||{})}}));
 const byId=new Map(current.map(p=>[p.id,p]));
 seedProviders().forEach(seed=>{
  const old=byId.get(seed.id);
  if(old){
   Object.assign(old,{...seed,...old});
   old.services=(old.services&&old.services.length)?old.services:seed.services;
   old.stats={...(seed.stats||{}),...(old.stats||{})};
  } else current.push(seed);
 });
 return current;
}

 (S.categories||[]).forEach(cat=>{cat.services=(cat.services||[]).filter(service=>!SERVICE_ID_ALIASES[service.id]);});
 const remapServices=services=>{
  const rows=[],seen=new Set();
  (services||[]).forEach(service=>{const targetId=SERVICE_ID_ALIASES[service.serviceId]||service.serviceId,target=targetRef(targetId),next={...service,catId:target?.catId||service.catId,serviceId:targetId},key=`${next.catId}|${next.serviceId}`;if(!seen.has(key)){seen.add(key);rows.push(next);}});

 (S.customerRequests||[]).forEach(remapRequest);(S.leads||[]).forEach(remapRequest);

async function requestDeviceNotifications(){

 const permission=Notification.permission==='default'?await Notification.requestPermission():Notification.permission;
 if(permission==='granted'){
  S.platform.deviceNotifications=true;save();
  try{
   const reg=await navigator.serviceWorker?.ready,keyResponse=await api('/api/push/public-key'),publicKey=keyResponse.publicKey;
   if(reg?.pushManager&&publicKey&&activeAuthToken()){
    const padding='='.repeat((4-publicKey.length%4)%4),base64=(publicKey+padding).replace(/-/g,'+').replace(/_/g,'/'),raw=atob(base64),key=Uint8Array.from([...raw].map(ch=>ch.charCodeAt(0)));
    const subscription=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:key});
    await api('/api/push/subscribe',{subscription:subscription.toJSON()},activeAuthToken());
   }
  }catch(err){console.warn('Push subscription pending',err);}
  toast(L('تم تفعيل إشعارات الهاتف.','Phone notifications enabled.'));return true;
 }
 toast(L('لم يتم السماح بإشعارات الهاتف.','Phone notifications were not allowed.'));return false;
}

const ARABIC_NORMALIZE_MAP={'أ':'ا','إ':'ا','آ':'ا','ى':'ي','ؤ':'و','ئ':'ي','ة':'ه'};
function normalizeSearchText(value){ return String(value||'').toLowerCase().replace(/[أإآىؤئة]/g,c=>ARABIC_NORMALIZE_MAP[c]||c).replace(/[^\u0600-\u06ff\w\s]/g,' ').replace(/\s+/g,' ').trim(); }
function editDistance(a,b){
 a=normalizeSearchText(a);b=normalizeSearchText(b); if(!a)return b.length;if(!b)return a.length;
 const row=Array.from({length:b.length+1},(_,i)=>i);
 for(let i=1;i<=a.length;i++){let prev=row[0];row[0]=i;for(let j=1;j<=b.length;j++){const tmp=row[j];row[j]=Math.min(row[j]+1,row[j-1]+1,prev+(a[i-1]===b[j-1]?0:1));prev=tmp;}}
 return row[b.length];
}

function serviceSearchIndex(){
 const rows=[];
 S.categories.filter(c=>c.active).forEach(cat=>cat.services.filter(s=>s.active).forEach(s=>rows.push({cat,svc:s,value:`${cat.id}|${s.id}`,text:normalizeSearchText([s.ar,s.en,cat.ar,cat.en,s.keywords,SERVICE_SYNONYMS[s.id]].join(' '))})));
 return rows;
}
function searchServices(query,limit=80,catFilter=''){
 const q=normalizeSearchText(query), tokens=q.split(' ').filter(Boolean);
 const rows=serviceSearchIndex().filter(row=>!catFilter||row.cat.id===catFilter).map(row=>{
  if(!q)return {...row,score:1};
  let score=0;
  if(row.text.includes(q))score+=120-q.length;
  tokens.forEach(t=>{if(row.text.includes(t))score+=35; else {const words=row.text.split(' '); if(words.some(w=>Math.abs(w.length-t.length)<=1&&editDistance(w,t)<=1))score+=12;}});
  return {...row,score};
}).filter(x=>!q||x.score>0).sort((a,b)=>b.score-a.score||loc(a.svc).localeCompare(loc(b.svc)));
 return rows.slice(0,limit);
}
function searchCategories(query,limit=6){
 const q=normalizeSearchText(query),tokens=q.split(' ').filter(Boolean);
 if(!q)return [];
 return S.categories.filter(c=>c.active).map(cat=>{
  const services=cat.services.filter(s=>s.active),text=normalizeSearchText([cat.ar,cat.en,cat.icon,services.map(s=>[s.ar,s.en,s.keywords,SERVICE_SYNONYMS[s.id]].join(' ')).join(' ')].join(' '));
  let score=0;if(text.includes(q))score+=150-q.length;tokens.forEach(t=>{if(text.includes(t))score+=30;});
  return {cat,score,count:services.length};
 }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score||loc(a.cat).localeCompare(loc(b.cat))).slice(0,limit);
}

function serviceIconName(id,catId=''){
 const key=String(id||'').toLowerCase(),tokens=key.split(/[_-]+/).filter(Boolean),has=(...words)=>words.some(word=>tokens.includes(word)||key.startsWith(`${word}_`)||key.endsWith(`_${word}`));

 return `https://www.openstreetmap.org/export/embed.html?bbox=${encodeURIComponent(`${left},${bottom},${right},${top}`)}&layer=mapnik&marker=${encodeURIComponent(`${p.lat.toFixed(6)},${p.lng.toFixed(6)}`)}`;

function mapPointPercent(point,center,span){

 const x=(p.lng-(c.lng-span))/(span*2)*100,y=((c.lat+span)-p.lat)/(span*2)*100;
 if(x<1||x>99||y<1||y>99)return null;return {x,y};
}

function initLeafletMaps(){
 document.querySelectorAll('.leaflet-live-map:not([data-ready])').forEach(el=>{
 el.dataset.ready='1';
  if(!window.L){el.innerHTML=`<div class="map-fallback">${L('تعذر تحميل الخريطة التفاعلية','Interactive map could not load')}</div>`;return;}
  const Leaf=window.L;
  const center=[Number(el.dataset.lat),Number(el.dataset.lng)],zoom=el.dataset.full==='1'?12:11;
  const map=Leaf.map(el,{zoomControl:true,scrollWheelZoom:el.dataset.full==='1'}).setView(center,zoom);
  Leaf.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
  el.parentElement?.querySelector('.leaflet-map-fallback')?.remove();
  const bounds=[];
  const mapProviders=el.dataset.providerOnly?visibleProviders().filter(p=>p.id===el.dataset.providerOnly):filteredMapProviders();
  mapProviders.forEach(p=>{
   const point=areaCoordinates(p);if(!point)return;
   const company=providerType(p)==='company',color=company?'#d8b46a':'#168f7a';
   const marker=Leaf.circleMarker([point.lat,point.lng],{radius:company?9:8,color:'#fff',weight:2,fillColor:color,fillOpacity:.96}).addTo(map);
   marker.bindPopup(`<div class="leaflet-provider-popup"><b>${esc(p.name)}</b><span>${esc(p.wilayah||p.gov||'عُمان')}</span><button data-action="providerDetails" data-id="${esc(p.id)}">${L('فتح البطاقة','Open profile')}</button></div>`);
   bounds.push([point.lat,point.lng]);
  });
  const rLat=Number(el.dataset.requestLat),rLng=Number(el.dataset.requestLng);
  if(Number.isFinite(rLat)&&Number.isFinite(rLng)&&rLat){
   Leaf.circleMarker([rLat,rLng],{radius:10,color:'#fff',weight:3,fillColor:'#1f5f8b',fillOpacity:1}).addTo(map).bindTooltip(L('موقع طالب الخدمة','Service requester location'));
   bounds.push([rLat,rLng]);
  }
  if(el.dataset.selectable==='1'){
   let picked=null;
   const choose=point=>{
    const lat=Number(point.lat),lng=Number(point.lng);el.dataset.selectedLat=String(lat);el.dataset.selectedLng=String(lng);
    if(picked)picked.setLatLng([lat,lng]);else picked=Leaf.circleMarker([lat,lng],{radius:11,color:'#fff',weight:4,fillColor:'#0f9f83',fillOpacity:1}).addTo(map);
    picked.bindTooltip(L('الموقع المختار','Selected location'),{permanent:true,direction:'top'}).openTooltip();
    const latInput=document.getElementById('mapPickLat'),lngInput=document.getElementById('mapPickLng'),label=document.getElementById('mapSelectedLocation');
    if(latInput)latInput.value=lat.toFixed(6);if(lngInput)lngInput.value=lng.toFixed(6);if(label)label.textContent=`${lat.toFixed(6)}, ${lng.toFixed(6)}`;
   };
   if(Number.isFinite(rLat)&&Number.isFinite(rLng)&&rLat)choose({lat:rLat,lng:rLng});
   map.on('click',event=>choose(event.latlng));
  }
  if(el.dataset.full==='1'&&bounds.length>1)map.fitBounds(bounds,{padding:[28,28],maxZoom:14});
  setTimeout(()=>map.invalidateSize(),80);
 });
}

function providerAreaRank(p){const distance=providerDistanceInfo(p);if(distance)return distance.km;const userGov=S.user?.gov||'',userWilayah=S.user?.wilayah||'';if(userWilayah&&[p.wilayah,...(p.areas||[])].includes(userWilayah))return 500;if(userGov&&[p.gov,...(p.areas||[])].includes(userGov))return 1000;return 2000;}

function showUnreadOnLogin(target,id=''){
 const role=target==='provider'?(providerType(getProvider(id)||{})==='company'?'company':'provider'):target==='user'?'user':'';
 if(role&&!onboardingSeen(role,id)){
  showRoleOnboarding(role,id,()=>showUnreadOnLogin(target,id));
  return;
 }
 const unread=targetNotifications(target,id).filter(n=>!n.read);
 if(!unread.length)return;
 setTimeout(()=>notificationsSheet(),160);
}

function shareProviderCard(p){
 const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d'),w=1080,h=566;canvas.width=w;canvas.height=h;
 const draw=img=>{const grad=ctx.createLinearGradient(0,0,w,h);grad.addColorStop(0,'#0b3050');grad.addColorStop(1,'#15a085');ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);ctx.fillStyle='rgba(255,255,255,.96)';ctx.roundRect(45,45,w-90,h-90,32);ctx.fill();if(img){ctx.save();ctx.beginPath();ctx.roundRect(w-365,95,260,260,28);ctx.clip();ctx.drawImage(img,w-365,95,260,260);ctx.restore();}ctx.direction='rtl';ctx.textAlign='right';ctx.fillStyle='#102a43';ctx.font='bold 46px Arial';ctx.fillText(p.name,w-410,150);ctx.font='30px Arial';ctx.fillStyle='#486581';const service=loc(getSvc(providerPrimaryService(p)?.catId,providerPrimaryService(p)?.serviceId))||L('مزود خدمة','Service provider');ctx.fillText(service,w-410,210);ctx.fillText(`${p.wilayah||p.gov||'عُمان'}  •  ⭐ ${p.rating||0}`,w-410,265);ctx.font='bold 34px Arial';ctx.fillStyle='#0f766e';ctx.fillText(`${tr('priceFrom')} ${providerPrimaryService(p)?.priceFrom?money(providerPrimaryService(p).priceFrom)+' ر.ع':L('سعر مرن','Flexible price')}`,w-410,330);ctx.fillStyle='#fff';ctx.font='bold 34px Arial';ctx.fillText('خدماتي | Khadamati',w-70,h-72);canvas.toBlob(async blob=>{const url=providerShareUrl(p),file=blob?new File([blob],`khadamati-${p.id}.png`,{type:'image/png'}):null;try{if(file&&navigator.canShare?.({files:[file]})&&navigator.share)await navigator.share({title:p.name,text:L('بطاقة مزود على خدماتي','Provider card on Khadamati'),url,files:[file]});else if(navigator.share)await navigator.share({title:p.name,text:L('بطاقة مزود على خدماتي','Provider card on Khadamati'),url});else{await navigator.clipboard?.writeText(url);toast(L('تم نسخ رابط بطاقة المزود.','Provider card link copied.'));}}catch(err){if(err?.name!=='AbortError')toast(L('تعذرت المشاركة الآن.','Sharing is unavailable right now.'));}},'image/png',.92);};
 const src=p.cardImage||p.avatar||p.workImages?.[0]||'';if(src&&String(src).match(/^(data:|https?:|\/)/)){const img=new Image();img.onload=()=>draw(img);img.onerror=()=>draw(null);img.src=src;}else draw(null);
}

 return `<section class="subscription-command"><div><h2>${L('مركز الإدارة المالية','Financial operations center')}</h2><p>${L('قراءة شهرية للتحصيل والمصروف والذمم قبل اتخاذ القرار.','A monthly view of collections, expenses, and receivables before decisions.')}</p></div><div class="subscription-switches"><button class="subscription-switch" data-action="financeEntryForm">${icon('plus')} ${L('إيراد','Revenue')}</button><button class="subscription-switch" data-action="expenseForm">${icon('plus')} ${L('مصروف','Expense')}</button><button class="subscription-switch" data-action="exportFinanceCsv">${L('تصدير','Export')}</button></div></section><div class="finance-command-grid" style="margin-top:12px"><div class="finance-command-card"><small>${L('إيراد الشهر','Monthly revenue')}</small><b>${money(monthRevenue)} ${L('ر.ع','OMR')}</b></div><div class="finance-command-card"><small>${L('مصروف الشهر','Monthly expenses')}</small><b>${money(monthExpenses)} ${L('ر.ع','OMR')}</b></div><div class="finance-command-card"><small>${L('بانتظار التحصيل','Pending collection')}</small><b>${money(pending)} ${L('ر.ع','OMR')}</b></div><div class="finance-command-card"><small>${L('دفعات مؤكدة','Confirmed payments')}</small><b>${money(paid)} ${L('ر.ع','OMR')}</b></div></div><div class="panel" style="margin-top:12px"><div class="section-head" style="margin-top:0"><div><h3>${L('هدف الشهر','Monthly target')}</h3><p>${progress}% • ${money(monthRevenue)} / ${money(goal)} ${L('ر.ع','OMR')}</p></div><b>${monthRevenue-monthExpenses>=0?'+':''}${money(monthRevenue-monthExpenses)} ${L('ر.ع','OMR')}</b></div><div class="finance-progress"><i style="width:${progress}%"></i></div></div>`;
}

function refreshProviderRegistrationProgress(){
 const form=document.getElementById('providerRegisterForm');if(!form)return;
 const accountReady=!!(val('regName')&&val('regCommercialNo')&&val('regPhone')&&val('regPin'));
 const servicesReady=!!(val('regService')&&wordCount(val('regBio'))>=3&&wordCount(val('regBio'))<=20);
 const trustReady=!!(document.getElementById('regDocs')?.files?.length);
 const stages=[...form.querySelectorAll('[data-reg-stage]')];
 const prefix=accountReady?(servicesReady?(trustReady?3:2):1):0;
 const active=Math.min(prefix+1,3);
 stages.forEach((stage,index)=>{stage.classList.toggle('done',index<prefix);stage.classList.toggle('active',index+1===active);});
 form.querySelector('.provider-reg-progress')?.style.setProperty('--reg-progress',`${Math.min(prefix,2)*37}%`);
}

 return `${role}:${safeIdentity}`;
}

}

function compressImageFile(file,maxEdge=1280,quality=.78){
 return new Promise(resolve=>{
  if(!file?.type?.startsWith('image/')) return resolve('');
  const reader=new FileReader();
  reader.onerror=()=>resolve('');
  reader.onload=()=>{
   const img=new Image();
   img.onerror=()=>resolve(reader.result||'');
   img.onload=()=>{
    const ratio=Math.min(1,maxEdge/Math.max(img.naturalWidth||1,img.naturalHeight||1));
    const width=Math.max(1,Math.round(img.naturalWidth*ratio)),height=Math.max(1,Math.round(img.naturalHeight*ratio));
    const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;
    const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,width,height);ctx.drawImage(img,0,0,width,height);
    resolve(canvas.toDataURL('image/jpeg',quality));
   };
   img.src=reader.result;
  };
  reader.readAsDataURL(file);
 });
}

function download(name, content, type='text/plain'){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
async function downloadApiFile(path,filename){
 const res=await fetch(apiUrl(path),{headers:{Authorization:`Bearer ${AUTH.adminToken||''}`}});
 if(!res.ok)throw new Error((await res.json().catch(()=>({}))).error||'request_failed');
 const blob=await res.blob(),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(url),1200);
}
async function protectedDocument(src,downloadName=''){
 if(String(src).startsWith('data:')){const a=document.createElement('a');a.href=src;if(downloadName)a.download=downloadName;else a.target='_blank';a.click();return;}
 const res=await fetch(src,{headers:{Authorization:`Bearer ${AUTH.adminToken||''}`}});
 if(!res.ok)throw new Error('document_access_denied');
 const url=URL.createObjectURL(await res.blob()),a=document.createElement('a');a.href=url;if(downloadName)a.download=downloadName;else{a.target='_blank';a.rel='noopener';}a.click();setTimeout(()=>URL.revokeObjectURL(url),30000);
}

function openAdminNotificationTarget(n){

 setTimeout(()=>{
  const provider=getProvider(related);
  if(['providers','companies','quality','expiries'].includes(route)&&provider){adminEditProvider(provider.id);return;}
  if(route==='providerRequests'&&provider){adminEditProvider(provider.id);return;}
  if(route==='subscriptions'){const sub=(S.subscriptions||[]).find(s=>s.id===related);if(sub){subscriptionFormPublic(sub.id);return;}if(provider){subscriptionFormPublic('',provider.id);return;}}

  if(route==='leads'){adminRequestDetails(related);return;}
  if(route==='ads'){const ad=(S.adSlides||[]).find(x=>x.id===related);if(ad)adEditSheet(ad.id);}
 },30);
}

async function onClick(e){ const el=e.target.closest('[data-action]'); if(!el)return; const a=el.dataset.action; if(a==='closeModalSoft'&&e.target!==el)return; const id=el.dataset.id; try{
 if(a==='dismissTip'){S.tipsSeen=S.tipsSeen||{};S.tipsSeen[el.dataset.tip||'general']=true;save();render();return;}
 if(a==='retryOfflineQueue'){if(!navigator.onLine){toast(L('لا يوجد اتصال بالإنترنت حالياً.','No internet connection right now.'));return;}await flushOfflineQueue();render();return;}
 if(a==='openQuoteLibrary'||a==='prepareQuote'){quoteTemplateSheet(id||'');return;}
 if(a==='sendPreparedQuote'){
  const lead=(S.leads||[]).find(l=>l.id===val('quoteLead')),template=(S.quoteTemplates||[]).find(t=>t.id===val('quoteTemplate'))||(S.quoteTemplates||[])[0],p=getProvider(S.currentProviderId);if(!lead||!p)return;
  const message=quotePreviewText(template,val('quotePrice'),val('quoteDuration'),lead.customer_name||lead.customerName||'');
  try{await api('/api/leads',{providerId:p.id,kind:'quote',customerName:lead.customer_name||lead.customerName||'',phone:lead.phone||'',serviceValue:leadServiceValue(lead),serviceName:leadServiceName(lead),gov:lead.gov||'',status:'offered',note:message},AUTH.providerToken);}catch(err){if(String(err?.message||err)!=='request_failed'){showError(err);return;}}
 trackEvent('quote_sent',{providerId:p.id,leadId:lead.id,price:Number(val('quotePrice')||0),duration:val('quoteDuration')});save();closeModal();toast(L('تم إرسال العرض داخل التطبيق دون كشف رقم العميل.','The offer was sent in-app without exposing the customer number.'));return;
 }
 if(a==='compareRequestOffers'){compareOffersSheet(id);return;}
