}

function searchServices(query,limit=80){

function getLiveLocation(){

 });
}

function availabilityPicker(prefix, current=''){
 const text=String(current||'');
 const all=!text||text.includes('كل أيام الأسبوع')||text.includes('All weekdays');
 const times=[...text.matchAll(/\b([01]?\d|2[0-3]):[0-5]\d\b/g)].map(m=>m[0].padStart(5,'0'));

}
function availabilityText(prefix){
 const from=val(prefix+'TimeFrom')||'08:00', to=val(prefix+'TimeTo')||'20:00', note=val(prefix+'AvailNote');
 const days=WEEK_DAYS.filter(([id])=>checked(`${prefix}Day_${id}`)).map(([,ar,en])=>L(ar,en));
 if(!days.length) return '';
 const dayText=days.length===7?L('كل أيام الأسبوع','Every day'):days.join(L('، ',', '));
 return `${dayText} ${from} - ${to}`+(note?` - ${note}`:'');
}

function mapEmbedUrl(point, span=.055){
 const p=normalizeCoordinates(point)||{lat:23.588,lng:58.382};
 const left=(p.lng-span).toFixed(6),bottom=(p.lat-span).toFixed(6),right=(p.lng+span).toFixed(6),top=(p.lat+span).toFixed(6);
 return `https://www.openstreetmap.org/export/embed.html?bbox=${encodeURIComponent(`${left},${bottom},${right},${top}`)}&layer=mapnik&marker=${encodeURIComponent(`${p.lat.toFixed(6)},${p.lng.toFixed(6)}`)}`;
}
function mapPointPercent(point,center,span){
 const p=normalizeCoordinates(point),c=normalizeCoordinates(center);if(!p||!c)return null;
 const x=(p.lng-(c.lng-span))/(span*2)*100,y=((c.lat+span)-p.lat)/(span*2)*100;
 if(x<1||x>99||y<1||y>99)return null;return {x,y};
}
function filteredMapProviders(){

}

}

ters')}</button><button class="pill-btn primary" data-action="quickRequestForm">${L('أرسل طلب خدمة','Send service request')}</button></div></div>`}`;

function filterProviders(f={}){
 let list=visibleProviders(),q=normalizeSearchText(f.q||'');
 if(q){const rows=searchServices(q,30),serviceIds=new Set(rows.map(x=>x.svc.id)),catIds=new Set(rows.map(x=>x.cat.id));list=list.filter(p=>{const hay=normalizeSearchText([p.name,p.gov,p.wilayah,p.bio,...(p.areas||[])].join(' '));return hay.includes(q)||(p.services||[]).some(s=>serviceIds.has(s.serviceId)||catIds.has(s.catId));});}
 if(f.cat)list=list.filter(p=>(p.services||[]).some(s=>s.active&&s.catId===f.cat));if(f.service)list=list.filter(p=>(p.services||[]).some(s=>s.active&&s.serviceId===f.service));if(f.gov)list=list.filter(p=>p.gov===f.gov||(p.areas||[]).includes(f.gov));if(f.status)list=list.filter(p=>p.status===f.status);if(Number(f.minRating||0))list=list.filter(p=>Number(p.rating||0)>=Number(f.minRating));if(Number(f.maxPrice||0))list=list.filter(p=>Number(providerPrimaryService(p)?.priceFrom||0)<=Number(f.maxPrice));
 if(f.sort==='price')list.sort((a,b)=>(providerPrimaryService(a)?.priceFrom||999)-(providerPrimaryService(b)?.priceFrom||999));else if(f.sort==='nearest')list.sort((a,b)=>providerAreaRank(a)-providerAreaRank(b)||(b.rating||0)-(a.rating||0));else if(f.sort==='response')list.sort((a,b)=>(a.responseMinutes||999)-(b.responseMinutes||999)||(b.rating||0)-(a.rating||0));else if(f.sort==='featured')list.sort((a,b)=>(b.featured?1:0)-(a.featured?1:0)||(b.qualityScore||0)-(a.qualityScore||0));else list.sort((a,b)=>(b.qualityScore||profileStrength(b))-(a.qualityScore||profileStrength(a))||(b.rating||0)-(a.rating||0));return list;
}

function compressImageFile(file,maxEdge=1280,quality=.78){
 return new Promise(resolve=>{
  if(!file?.type?.startsWith('image/')) return resolve('');
  const reader=new FileReader();
  reader.onerror=()=>resolve('');
  reader.onload=()=>{
   const img=new Image();
   img.onerror=()=>resolve(reader.result||'');
   img.onload=()=>{
    const ratio=Math.min(1,maxEdge/Math.max(img.naturalWidth||1,img.naturalHeight||1));
    const width=Math.max(1,Math.round(img.naturalWidth*ratio)),height=Math.max(1,Math.round(img.naturalHeight*ratio));
    const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;
    const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,width,height);ctx.drawImage(img,0,0,width,height);
    resolve(canvas.toDataURL('image/jpeg',quality));
   };
   img.src=reader.result;
  };
  reader.readAsDataURL(file);
 });
}

function renderImageCropCanvas(){
 if(!IMAGE_EDITOR)return;
 const canvas=document.getElementById('imageCropCanvas');if(!canvas)return;
 const {image,spec,zoom,offsetX,offsetY,rotation}=IMAGE_EDITOR,ctx=canvas.getContext('2d'),w=spec.width,h=spec.height;
 canvas.width=w;canvas.height=h;ctx.fillStyle='#07131f';ctx.fillRect(0,0,w,h);
 const quarter=Math.abs(rotation%180)===90,rotW=quarter?image.naturalHeight:image.naturalWidth,rotH=quarter?image.naturalWidth:image.naturalHeight,base=Math.max(w/Math.max(1,rotW),h/Math.max(1,rotH))*zoom;
 ctx.save();ctx.translate(w/2+(offsetX/100)*w*.42,h/2+(offsetY/100)*h*.42);ctx.rotate(rotation*Math.PI/180);ctx.scale(base,base);ctx.drawImage(image,-image.naturalWidth/2,-image.naturalHeight/2);ctx.restore();
}
