function localizeStaticDom(){
 if(S.lang !== 'en') return;
 const walker=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,{acceptNode:n=>n.parentElement?.closest('script,style')?NodeFilter.FILTER_REJECT:NodeFilter.FILTER_ACCEPT});
 const nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
 nodes.forEach(n=>{ const raw=n.nodeValue, key=raw.trim(); if(UI_EN[key]) n.nodeValue=raw.replace(key,UI_EN[key]); });
 document.querySelectorAll('[placeholder],[title]').forEach(el=>['placeholder','title'].forEach(attr=>{ const v=el.getAttribute(attr); if(v&&UI_EN[v.trim()]) el.setAttribute(attr, UI_EN[v.trim()]); }));
}
function mergeCategoryCatalog(existing=[]){
 const current=(existing||[]).map(c=>({...c,services:[...(c.services||[])]}));
 const byCat=new Map(current.map(c=>[c.id,c]));
 [...seedCategories(),...expandedMarketCategories()].forEach(seed=>{
  const cat=byCat.get(seed.id);
  if(!cat){ current.push(seed); byCat.set(seed.id,seed); return; }
  cat.icon=cat.icon||seed.icon; cat.ar=cat.ar||seed.ar; cat.en=cat.en||seed.en; if(typeof cat.active==='undefined')cat.active=true;
  const bySvc=new Map((cat.services||[]).map(s=>[s.id,s]));
  seed.services.forEach(s=>{ if(!bySvc.has(s.id)) cat.services.push(s); });
 });
 return current;
}
function mergePackages(existing=[]){
 const current=(existing||[]).map(p=>({...p,duration:p.durationDays||p.duration||30,durationDays:p.durationDays||p.duration||30,active:p.active!==false}));
 const byId=new Map(current.map(p=>[p.id,p]));
 seedPackages().forEach(seed=>{
  const old=byId.get(seed.id);
  if(old) Object.assign(old,{...seed,...old,duration:old.durationDays||old.duration||seed.duration,durationDays:old.durationDays||old.duration||seed.duration});
  else current.push(seed);
 });
 const legacyCompany=current.find(p=>p.id==='company_year');
 if(legacyCompany && Number(legacyCompany.maxServices||0)>5) legacyCompany.maxServices=5;
 return current;
}
function mergeSeedProviders(existing=[]){
 const current=(existing||[]).map(p=>({...p,services:[...(p.services||[])],stats:{...(p.stats||{})}}));
 const byId=new Map(current.map(p=>[p.id,p]));
 seedProviders().forEach(seed=>{
  const old=byId.get(seed.id);
  if(old){
   Object.assign(old,{...seed,...old});
   old.services=(old.services&&old.services.length)?old.services:seed.services;
   old.stats={...(seed.stats||{}),...(old.stats||{})};
  } else current.push(seed);
 });
 return current;
}

const ARABIC_NORMALIZE_MAP={'أ':'ا','إ':'ا','آ':'ا','ى':'ي','ؤ':'و','ئ':'ي','ة':'ه'};
function normalizeSearchText(value){ return String(value||'').toLowerCase().replace(/[أإآىؤئة]/g,c=>ARABIC_NORMALIZE_MAP[c]||c).replace(/[^\u0600-\u06ff\w\s]/g,' ').replace(/\s+/g,' ').trim(); }
function editDistance(a,b){
 a=normalizeSearchText(a);b=normalizeSearchText(b); if(!a)return b.length;if(!b)return a.length;
 const row=Array.from({length:b.length+1},(_,i)=>i);
 for(let i=1;i<=a.length;i++){let prev=row[0];row[0]=i;for(let j=1;j<=b.length;j++){const tmp=row[j];row[j]=Math.min(row[j]+1,row[j-1]+1,prev+(a[i-1]===b[j-1]?0:1));prev=tmp;}}
 return row[b.length];
}

function serviceSearchIndex(){
 const rows=[];
 S.categories.filter(c=>c.active).forEach(cat=>cat.services.filter(s=>s.active).forEach(s=>rows.push({cat,svc:s,value:`${cat.id}|${s.id}`,text:normalizeSearchText([s.ar,s.en,cat.ar,cat.en,s.keywords,SERVICE_SYNONYMS[s.id]].join(' '))})));
 return rows;
}
function searchServices(query,limit=80){
 const q=normalizeSearchText(query), tokens=q.split(' ').filter(Boolean);
 const rows=serviceSearchIndex().map(row=>{
  if(!q)return {...row,score:1};
  let score=0;
  if(row.text.includes(q))score+=120-q.length;
  tokens.forEach(t=>{if(row.text.includes(t))score+=35; else {const words=row.text.split(' '); if(words.some(w=>Math.abs(w.length-t.length)<=1&&editDistance(w,t)<=1))score+=12;}});
  return {...row,score};
 }).filter(x=>!q||x.score>0).sort((a,b)=>b.score-a.score||loc(a.svc).localeCompare(loc(b.svc)));
 return rows.slice(0,limit);
}

function formatTime12(value){
 const match=String(value||'').match(/(\d{1,2}):(\d{2})/); if(!match)return value||'';
 const hour=Number(match[1]), minute=match[2], suffix=hour>=12?L('م','PM'):L('ص','AM');
 return `${hour%12||12}:${minute} ${suffix}`;
}

function availabilityPicker(prefix, current=''){
 const text=String(current||'');
 const all=!text||text.includes('كل أيام الأسبوع')||text.includes('All weekdays');
 const times=[...text.matchAll(/\b([01]?\d|2[0-3]):[0-5]\d\b/g)].map(m=>m[0].padStart(5,'0'));
 const from=times[0]||'08:00',to=times[1]||'20:00';
 const isDayChecked=(id,ar,en)=> all || text.includes(ar)||text.includes(en);
 return `<div class="form-card"><h3>${L('أوقات التوفر','Availability')}</h3><div class="availability-days">${WEEK_DAYS.map(([id,ar,en])=>`<label class="day-chip"><input type="checkbox" id="${prefix}Day_${id}" ${isDayChecked(id,ar,en)?'checked':''}>${L(ar,en)}</label>`).join('')}</div><button type="button" class="ghost-btn tiny all-days-btn" data-action="selectAllDays" data-prefix="${prefix}">${L('كل أيام الأسبوع','Every day')}</button><div class="time-selects" style="margin-top:12px"><div class="field"><label>${L('من','From')}</label><select class="select" id="${prefix}TimeFrom">${timeOptions(from)}</select></div><div class="field"><label>${L('إلى','To')}</label><select class="select" id="${prefix}TimeTo">${timeOptions(to)}</select></div></div><div class="field" style="margin-top:10px"><label>${L('ملاحظة التوفر','Availability note')}</label><input class="input" id="${prefix}AvailNote" value="" placeholder="${L('مثال: استقبال الطوارئ بعد 8 مساءً','Example: emergencies after 8 PM')}"></div></div>`;
}
function availabilityText(prefix){
 const from=val(prefix+'TimeFrom')||'08:00', to=val(prefix+'TimeTo')||'20:00', note=val(prefix+'AvailNote');
 const days=WEEK_DAYS.filter(([id])=>checked(`${prefix}Day_${id}`)).map(([,ar,en])=>L(ar,en));
 if(!days.length) return '';
 const dayText=days.length===7?L('كل أيام الأسبوع','Every day'):days.join(L('، ',', '));
 return `${dayText} ${from} - ${to}`+(note?` - ${note}`:'');
}

function startAdSlider(){

ion, issue, and useful details')}">${esc(r.note||'')}</textarea></div><button class="pill-btn primary" data-action="saveQuickRequest" style="width:100%;margin-top:14px">${icon('chat')} ${r.id?L('حفظ التعديل','Save changes'):L('إرسال الطلب','Send request')}</button></div></div>`);

function renderProviderApp(){ const p = S.currentProviderId ? getProvider(S.currentProviderId) : null; const tabs=['home','profile','services','availability','leads','subscription','performance','support']; if(!p) return layout(`<div class="provider-shell"><div class="section-head"><div><h2>${tr('providerAccess')}</h2><p>${tr('providerLogin')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="panel"><button class="pill-btn primary" data-action="openProviderAccess">${tr('providerLogin')}</button></div></div>`,{noBottom:true}); const unread=unreadNotifications('provider',p.id); return `<div class="topbar"><div class="container topbar-inner"><button class="brand" data-action="nav" data-view="provider" style="border:0;background:transparent">${logoMark()}<span>${tr('provider')}</span></button><div class="top-actions"><button class="icon-btn" data-action="openNotifications">${icon('bell')}${unread?`<span class="notification-badge">${unread}</span>`:''}</button><button class="icon-btn" data-action="toggleLang">${icon('globe')}</button><button class="pill-btn" data-action="providerUserMode">${L('وضع المستخدم','User mode')}</button><button class="pill-btn" data-action="providerLogout">${L('خروج','Sign out')}</button></div></div></div><main class="container provider-shell"><div class="side-layout"><aside class="side-nav">${tabs.map(t=>`<button data-action="providerTab" data-tab="${t}" class="${S.providerTab===t?'active':''}">${tabIcon(t)} ${tr('provider'+cap(t))}</button>`).join('')}</aside><section>${renderProviderTab(p)}</section></div></main>`; }

function requestStats(){
 const requests=S.customerRequests||[],counts={},govs={};
 requests.forEach(r=>{const key=r.serviceName||serviceLabelFromValue(r.serviceValue);counts[key]=(counts[key]||0)+1;if(r.gov)govs[r.gov]=(govs[r.gov]||0)+1;});

 return {today:requests.filter(r=>String(r.createdAt||'').slice(0,10)===new Date().toISOString().slice(0,10)).length,topService:top[0],topServiceCount:top[1],topGov:topGov[0],topGovCount:topGov[1]};
}
function smartAdminRecommendations(){

 Object.entries(byGov).forEach(([gov,count])=>{const providers=S.providers.filter(p=>p.active&&(p.gov===gov||(p.areas||[]).includes(gov))).length;if(count>=3&&providers<2)out.push({title:'محافظة تحتاج توسعاً',text:`${gov}: ${count} طلبات مقابل ${providers} مزود نشط.`,route:'providers',priority:'normal'});});

function adminLeads(){ const leads=(S.leads||[]); const customer=(S.customerRequests||[]); return `<div class="section-head"><div><h2>طلبات العملاء</h2><p>كل الطلبات والتواصلات القادمة من الموقع.</p></div><button class="pill-btn" data-action="exportLeadsCsv">${tr('exportCsv')}</button></div><div class="admin-grid grid"><div class="card mini-stat"><span>طلبات محفوظة</span><b>${leads.length}</b></div><div class="card mini-stat"><span>طلبات هذا الجهاز</span><b>${customer.length}</b></div><div class="card mini-stat"><span>واتساب</span><b>${leads.filter(x=>x.kind==='whatsapp').length}</b></div><div class="card mini-stat"><span>اتصالات</span><b>${leads.filter(x=>x.kind==='calls').length}</b></div></div><div class="panel" style="margin-top:14px"><h2>قائمة الطلبات</h2><div class="list">${leads.map(l=>`<div class="list-item"><div><b>${esc(l.customer_name||l.customerName||'عميل')}</b><div class="muted">${esc(l.phone||'')} • ${esc(l.kind||'request')} • ${esc(l.created_at||l.createdAt||'')}</div><p>${esc(l.note||'')}</p></div><div class="row-actions">${l.provider_id?`<button class="ghost-btn tiny" data-action="providerDetails" data-id="${l.provider_id}">المزود</button>`:''}<button class="ghost-btn tiny" data-action="copyLead" data-id="${l.id}">نسخ</button></div></div>`).join('')||'<div class="empty">لا توجد طلبات محفوظة بعد</div>'}</div></div>${customer.length?`<div class="panel" style="margin-top:14px"><h2>طلبات العميل المحلية</h2><div class="list">${customer.map(r=>requestCard(r,true)).join('')}</div></div>`:''}`; }
function adminQuality(){ const weak=S.providers.filter(p=>profileStrength(p)<75); const noImages=S.providers.filter(p=>!(p.workImages||[]).length); const noHours=S.providers.filter(p=>!p.hours); const pending=S.providerRequests.length; return `<div class="section-head"><div><h2>جودة التطبيق</h2><p>قائمة فحص سريعة لتحسين جاهزية المنصة.</p></div></div><div class="admin-grid grid"><div class="card mini-stat"><span>ملفات ضعيفة</span><b>${weak.length}</b></div><div class="card mini-stat"><span>بدون صور أعمال</span><b>${noImages.length}</b></div><div class="card mini-stat"><span>بدون أوقات عمل</span><b>${noHours.length}</b></div><div class="card mini-stat"><span>طلبات تنتظر</span><b>${pending}</b></div></div><div class="panel" style="margin-top:14px"><h2>إجراءات مقترحة</h2><div class="list">${[...new Set([...weak,...noImages,...noHours])].slice(0,8).map(p=>`<div class="list-item"><div><b>${esc(p.name)}</b><div class="muted">قوة الملف ${profileStrength(p)}% • صور الأعمال ${(p.workImages||[]).length}/5 • ${p.hours||'لا يوجد وقت عمل'}</div></div><button class="ghost-btn tiny" data-action="adminEditProvider" data-id="${p.id}">${tr('edit')}</button></div>`).join('')||`<div class="empty">كل الملفات الأساسية جيدة.</div>`}</div></div>`; }
function adminComplaints(){ const items=S.complaints||[]; return `<div class="section-head"><div><h2>الشكاوى والجودة</h2><p>متابعة البلاغات وإغلاقها يرفع جودة المنصة.</p></div></div><div class="admin-grid grid"><div class="card mini-stat"><span>مفتوحة</span><b>${items.filter(c=>c.status==='open').length}</b></div><div class="card mini-stat"><span>قيد المتابعة</span><b>${items.filter(c=>c.status==='reviewing').length}</b></div><div class="card mini-stat"><span>مغلقة</span><b>${items.filter(c=>c.status==='closed').length}</b></div><div class="card mini-stat"><span>عالية</span><b>${items.filter(c=>c.priority==='high').length}</b></div></div><div class="panel" style="margin-top:14px"><div class="list">${items.map(c=>{const p=getProvider(c.provider_id||c.providerId);return `<div class="list-item"><div><b>${esc(c.reason||'شكوى')} • ${esc(p?.name||'بدون مزود')}</b><div class="muted">${esc(c.customer_name||c.customerName||'عميل')} • ${esc(c.phone||'')} • ${esc(c.status)}</div><p>${esc(c.detail||'')}</p></div><div class="row-actions"><button class="ghost-btn tiny" data-action="complaintStatus" data-id="${c.id}" data-status="reviewing">متابعة</button><button class="ghost-btn tiny" data-action="complaintStatus" data-id="${c.id}" data-status="closed">إغلاق</button></div></div>`}).join('')||'<div class="empty">لا توجد شكاوى</div>'}</div></div>`; }
function adminSubscriptions(){ const subs=S.subscriptions||[]; const ending=S.providers.filter(p=>{const s=subscriptionState(p);return s.status!=='free'&&s.days<=14&&s.days>=0}); const expired=S.providers.filter(p=>subscriptionState(p).status==='expired'); return `<div class="section-head"><div><h2>الاشتراكات والباقات</h2><p>${S.platform.subscriptionsEnabled?'الاشتراكات مفعلة.':'الإطلاق مجاني حالياً. الدفع يعمل كطلب ترقية ينتظر موافقة الإدارة.'}</p></div><button class="pill-btn primary" data-action="newSubscriptionForm">إضافة اشتراك</button></div><div class="three-col">${S.packages.map(pkg=>`<div class="card"><b>${esc(loc(pkg))}</b><p class="muted">${money(pkg.price)} ر.ع • ${pkg.duration||pkg.durationDays||30} يوم • ${pkg.scope==='company'?'شركة':'مزود'} • ${pkg.maxImages||5} صور</p><button class="ghost-btn tiny" data-action="packageForm" data-id="${pkg.id}">${tr('edit')}</button></div>`).join('')}</div><div class="admin-grid grid" style="margin-top:14px"><div class="card mini-stat"><span>قريبة الانتهاء</span><b>${ending.length}</b></div><div class="card mini-stat"><span>منتهية</span><b>${expired.length}</b></div><div class="card mini-stat"><span>طلبات تنتظر</span><b>${subs.filter(s=>s.status==='pending').length}</b></div><div class="card mini-stat"><span>بوابة الدفع</span><b>${S.platform.paymentGatewayEnabled?'مفعلة':'غير مفعلة'}</b></div></div><div class="panel" style="margin-top:14px"><h2>طلبات واشتراكات</h2><div class="list">${subs.map(s=>{const p=getProvider(s.providerId||s.provider_id);return `<div class="list-item"><div><b>${esc(p?.name||'مزود')} • ${esc(s.status)}</b><div class="muted">${esc(s.packageId||s.package_id)} • ${money(s.amount)} ر.ع • ${esc(s.startDate||s.start_date||'')} - ${esc(s.endDate||s.end_date||'')}</div><p>${esc(s.note||'')}</p></div><div class="row-actions"><button class="ghost-btn tiny" data-action="activateSubscription" data-id="${s.id}">تفعيل/تمديد</button><button class="ghost-btn tiny" data-action="recordPaymentForSub" data-id="${s.id}">تسجيل دفع</button></div></div>`}).join('')||'<div class="empty">لا توجد اشتراكات بعد</div>'}</div></div><div class="two-col" style="margin-top:14px"><div class="panel"><h2>قريبة الانتهاء</h2>${adminProviderRows(ending)}</div><div class="panel"><h2>منتهية</h2>${adminProviderRows(expired)}</div></div>`; }
function adminReports(){ const top=(S.reports?.topProviders||S.providers).slice(0,8); const queue=S.reports?.qualityQueue||S.providers.filter(p=>(p.qualityScore||profileStrength(p))<65); return `<div class="section-head"><div><h2>التقارير</h2><p>قراءة تشغيلية سريعة للنمو والجودة.</p></div><button class="pill-btn" data-action="exportReportsCsv">${tr('exportCsv')}</button></div><div class="two-col"><div class="panel"><h2>أفضل المزودين</h2><div class="list">${top.map(p=>`<div class="list-item"><div><b>${esc(p.name)}</b><div class="muted">جودة ${p.qualityScore||0}% • تقييم ${p.rating||0} • واتساب ${p.stats?.whatsapp||0}</div></div></div>`).join('')}</div></div><div class="panel"><h2>قائمة تحسين الجودة</h2><div class="list">${queue.map(p=>`<div class="list-item"><div><b>${esc(p.name)}</b><div class="muted">جودة ${p.qualityScore||profileStrength(p)}% • تقييم ${p.rating||0}</div></div><button class="ghost-btn tiny" data-action="adminEditProvider" data-id="${p.id}">${tr('edit')}</button></div>`).join('')||'<div class="empty">لا توجد مشاكل جودة واضحة</div>'}</div></div></div><div class="panel" style="margin-top:14px"><h2>سجل الإدارة</h2><div class="timeline">${(S.auditLogs||[]).slice(0,20).map(a=>`<div class="list-item"><span class="icon-chip">•</span><div><b>${esc(a.action)}</b><div class="muted">${esc(a.actor_kind||'')} • ${esc(a.target||'')} • ${esc(a.created_at||'')}</div><p>${esc(a.detail||'')}</p></div></div>`).join('')||'<div class="empty">لا يوجد سجل عمليات بعد</div>'}</div></div>`; }
function providerIssues(p){ const issues=[]; if(!p.commercialNo&&!p.licenseNo)issues.push('رقم الترخيص ناقص');if(!(p.documents||[]).length)issues.push('وثيقة ناقصة');if(wordCount(p.bio)<3||wordCount(p.bio)>20)issues.push('الوصف يحتاج مراجعة');if(!(p.workImages||[]).length)issues.push('لا توجد صور');const sub=subscriptionState(p);if(sub.status==='expired')issues.push('الاشتراك منتهي');else if(sub.days<=30&&sub.status!=='free')issues.push('قريب الانتهاء');return issues; }
function adminProviderRows(items){ return `<div class="list">${items.map(p=>{const sub=subscriptionState(p),issues=providerIssues(p);return `<div class="list-item"><div><b>${esc(p.name)} ${p.verified?'✓':''} ${providerType(p)==='company'?'<span class="badge company-pill">شركة</span>':''}</b><div class="muted">${esc(p.phone)} • ${esc(p.wilayah)} • ${statusBadge(p.status)} • ${p.featured?'مميز':'غير مميز'} • ${esc(sub.label)}</div><div class="trust-row" style="margin-top:6px">${issues.map(x=>`<span class="badge ${x.includes('منتهي')||x.includes('ناقص')?'off':'warn'}">${esc(x)}</span>`).join('')}${!issues.length?'<span class="badge ok">الملف مكتمل</span>':''}</div></div><div class="admin-provider-tools"><button class="ghost-btn tiny" title="اشتراك" data-action="newSubscriptionForm" data-provider="${p.id}">${icon('wallet')}</button><button class="ghost-btn tiny" title="واتساب" data-action="adminProviderWhatsapp" data-id="${p.id}">${icon('chat')}</button><button class="ghost-btn tiny" title="اتصال" data-action="adminProviderCall" data-id="${p.id}">${icon('phone')}</button><button class="ghost-btn tiny" title="ملاحظة" data-action="adminProviderNote" data-id="${p.id}">${icon('bell')}</button><button class="ghost-btn tiny" data-action="adminEditProvider" data-id="${p.id}">${tr('edit')}</button><button class="ghost-btn tiny" data-action="adminToggleProvider" data-id="${p.id}">${p.active?tr('stop'):tr('activate')}</button><button class="ghost-btn tiny" data-action="adminVerifyProvider" data-id="${p.id}">${tr('verify')}</button></div></div>`}).join('')||`<div class="empty">${tr('noResults')}</div>`}</div>`; }
function adminProviders(){ const f=S.adminProviderFilter||{}; let items=[...S.providers]; const q=normalizeSearchText(f.q||''); if(q)items=items.filter(p=>normalizeSearchText([p.name,p.companyName,p.phone,p.gov,p.wilayah,p.bio,p.commercialNo].join(' ')).includes(q)); if(f.type)items=items.filter(p=>providerType(p)===f.type); if(f.status)items=items.filter(p=>p.status===f.status); if(f.gov)items=items.filter(p=>p.gov===f.gov); if(f.featured==='yes')items=items.filter(p=>p.featured); if(f.package)items=items.filter(p=>p.packageId===f.package); if(f.service)items=items.filter(p=>(p.services||[]).some(s=>`${s.catId}|${s.serviceId}`===f.service)); if(f.sub)items=items.filter(p=>subscriptionState(p).status===f.sub || (f.sub==='ending'&&subscriptionState(p).days<=30&&subscriptionState(p).status!=='expired')); return `<div class="section-head"><div><h2>${tr('manageProviders')}</h2><p>${items.length} مزود ضمن النتائج</p></div></div><div class="admin-filter-wide"><input class="input" id="adminProviderQ" value="${esc(f.q||'')}" placeholder="الاسم أو الهاتف أو رقم الترخيص"><select class="select" id="adminProviderType"><option value="">النوع</option><option value="individual" ${f.type==='individual'?'selected':''}>مزود فردي</option><option value="company" ${f.type==='company'?'selected':''}>شركة</option></select><select class="select" id="adminProviderStatus"><option value="">الحالة</option><option value="available" ${f.status==='available'?'selected':''}>متاح</option><option value="busy" ${f.status==='busy'?'selected':''}>مشغول</option><option value="unavailable" ${f.status==='unavailable'?'selected':''}>غير متاح</option></select><select class="select" id="adminProviderSub"><option value="">الاشتراك</option><option value="active" ${f.sub==='active'?'selected':''}>نشط</option><option value="ending" ${f.sub==='ending'?'selected':''}>قريب الانتهاء</option><option value="expired" ${f.sub==='expired'?'selected':''}>منتهي</option><option value="free" ${f.sub==='free'?'selected':''}>مجاني</option></select><select class="select" id="adminProviderPackage"><option value="">الباقة</option>${S.packages.map(pkg=>`<option value="${pkg.id}" ${f.package===pkg.id?'selected':''}>${esc(loc(pkg))}</option>`).join('')}</select><select class="select" id="adminProviderService"><option value="">الخدمة</option>${allServicesOptions('',f.service||'')}</select><select class="select" id="adminProviderFeatured"><option value="">التمييز</option><option value="yes" ${f.featured==='yes'?'selected':''}>مزود مميز</option></select><select class="select" id="adminProviderGov"><option value="">${tr('all')}</option>${govOptions(f.gov||'')}</select><button class="pill-btn primary" data-action="adminProviderFilter">${tr('search')}</button></div>${adminProviderRows(items)}`; }
function adminCompanies(){ const companies=S.providers.filter(p=>providerType(p)==='company'); return `<div class="section-head"><div><h2>الشركات</h2><p>إدارة الشركات منفصلة عن المزودين الأفراد. باقة الشركة تسمح حتى 3 مزودين تحت نفس الاشتراك.</p></div></div>${adminProviderRows(companies)}`; }
function adminRequests(){ return `<div class="section-head"><div><h2>${tr('providerRequests')}</h2></div></div><div class="list">${S.providerRequests.length?S.providerRequests.map(p=>{const ready=!!p.commercialNo&&wordCount(p.bio)>=3&&wordCount(p.bio)<=20&&(p.documents||[]).length;return `<div class="list-item"><div><b>${esc(p.name)} ${providerType(p)==='company'?'<span class="badge company-pill">شركة</span>':''}</b><div class="muted">${esc(p.phone)} • ${esc(p.wilayah)} • ${esc(serviceLabelFromValue(p.service)||loc(getSvc(providerPrimaryService(p)?.catId,providerPrimaryService(p)?.serviceId))||'')}</div><div class="muted">${esc(displayHours(p.hours||''))} • ${(p.workImages||[]).length}/${providerType(p)==='company'?15:5} صور • ترخيص: ${esc(p.commercialNo||'ناقص')} • وثائق: ${(p.documents||[]).length}</div><span class="badge ${ready?'ok':'off'}">${ready?'جاهز للمراجعة':'بيانات إلزامية ناقصة'}</span></div><div class="row-actions"><button class="ghost-btn tiny" data-action="adminReviewRequest" data-id="${p.id}">${tr('review')}</button><button class="ghost-btn tiny" data-action="adminAcceptRequest" data-id="${p.id}" ${ready?'':'disabled'}>${tr('accept')}</button><button class="ghost-btn tiny" data-action="adminRejectRequest" data-id="${p.id}">${tr('reject')}</button></div></div>`}).join(''):`<div class="empty">${tr('noResults')}</div>`}</div>`; }
function adminCategories(){ return `<div class="section-head"><div><h2>${tr('categoryAdmin')}</h2></div><button class="pill-btn primary" data-action="catForm">${tr('addCategory')}</button></div><div class="list">${S.categories.map(c=>`<div class="panel"><div class="list-item"><div><b>${c.icon} ${esc(loc(c))}</b><div class="muted">${c.active?tr('activate'):tr('stop')} • ${c.services.length}</div></div><div class="row-actions"><button class="ghost-btn tiny" data-action="catForm" data-id="${c.id}">${tr('edit')}</button><button class="ghost-btn tiny" data-action="toggleCat" data-id="${c.id}">${c.active?tr('stop'):tr('activate')}</button><button class="ghost-btn tiny" data-action="serviceForm" data-cat="${c.id}">${tr('addSubService')}</button><button class="ghost-btn tiny" data-action="deleteCat" data-id="${c.id}">${tr('delete')}</button></div></div><div class="list" style="margin-top:10px">${c.services.map(s=>`<div class="list-item"><div>${s.icon} <b>${esc(loc(s))}</b><div class="muted">${s.active?tr('activate'):tr('stop')}</div></div><div class="row-actions"><button class="ghost-btn tiny" data-action="serviceForm" data-cat="${c.id}" data-id="${s.id}">${tr('edit')}</button><button class="ghost-btn tiny" data-action="toggleSvc" data-cat="${c.id}" data-id="${s.id}">${s.active?tr('stop'):tr('activate')}</button><button class="ghost-btn tiny" data-action="deleteSvc" data-cat="${c.id}" data-id="${s.id}">${tr('delete')}</button></div></div>`).join('')}</div></div>`).join('')}</div>`; }

 form.classList.toggle('provider-type-individual',!isCompany);
 const note=document.getElementById('regTypeNote');
 const nameLabel=document.getElementById('regNameLabel');

 const company=document.getElementById('regCompanyName');
 const commercialLabel=document.getElementById('regCommercialLabel');
 const hint=document.getElementById('regWorkHint');
 if(note) note.textContent=isCompany?'حساب شركة: خدمات متعددة، صور أكثر، وإدارة منفصلة عن المزود الفردي.':'حساب فردي: مناسب لصاحب مهارة أو نشاط مستقل بخدمة مباشرة.';

function readImageFiles(id, limit=1){
 const input=document.getElementById(id), files=[...(input?.files||[])].slice(0,limit);
 return Promise.all(files.map(file=>new Promise(resolve=>{
  if(!file.type.startsWith('image/')) return resolve('');
  const r=new FileReader();
  r.onload=()=>resolve(r.result);
  r.onerror=()=>resolve('');
  r.readAsDataURL(file);
 }))).then(list=>list.filter(Boolean));
}
function readAnyFiles(id, limit=1){
 const input=document.getElementById(id), files=[...(input?.files||[])].slice(0,limit);
 return Promise.all(files.map(file=>new Promise(resolve=>{
  const ok=file.type.startsWith('image/') || file.type==='application/pdf';
  if(!ok) return resolve('');
  const r=new FileReader();
  r.onload=()=>resolve(r.result);
  r.onerror=()=>resolve('');
  r.readAsDataURL(file);
 }))).then(list=>list.filter(Boolean));
}
