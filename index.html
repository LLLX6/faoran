 <section><div class="section-head"><div><h2>${tr('browseCategories')}</h2><p>${tr('categories')}</p></div></div><div class="category-grid grid">${S.categories.filter(c=>c.active).slice(0,8).map(c=>catTile(c)).join('')}</div></section>
 <section><div class="section-head"><div><h2>${tr('featuredProviders')}</h2><p>${tr('topRated')}</p></div><button class="ghost-btn" data-action="nav" data-view="search">${tr('search')}</button></div><div class="provider-grid grid">${(featured.length?featured:top).map(providerCard).join('')}</div></section>`; }
function catTile(c){ const count=c.services.filter(s=>s.active).length; return `<button class="tile" data-action="category" data-cat="${c.id}"><span class="tile-icon">${c.icon}</span><span class="tile-title">${esc(loc(c))}</span><small>${count}</small></button>`; }
function serviceTile(cat, svc, compact=false){ return `<button class="tile" data-action="serviceSearch" data-cat="${cat.id}" data-service="${svc.id}"><span class="tile-icon">${svc.icon||cat.icon}</span><span class="tile-title">${esc(loc(svc))}</span>${compact?`<small>${esc(loc(cat))}</small>`:''}</button>`; }
function findServiceById(sid){ for(const c of S.categories){ const svc=c.services.find(s=>s.id===sid); if(svc) return {cat:c,svc}; } return null; }
function visibleProviders(){ return S.providers.filter(p=>p.active && (p.services||[]).some(s=>s.active)); }
function providerCard(p){ const ps=providerPrimaryService(p); const cat=getCat(ps?.catId), svc=getSvc(ps?.catId, ps?.serviceId); return `<article class="provider-card"><button class="heart ${isFav(p.id)?'active':''}" data-action="fav" data-id="${p.id}" title="${tr('favorites')}">${isFav(p.id)?'♥':'♡'}</button><div class="avatar">${p.avatar&&String(p.avatar).startsWith('data:')?`<img src="${p.avatar}">`:esc(p.avatar||initials(p.name))}</div><div><div class="pc-name">${esc(p.name)} ${p.verified?'✓':''}</div><div class="pc-meta"><span>${esc(loc(svc)||'')}</span><span>•</span><span>${esc(p.wilayah)}</span><span>•</span><span>⭐ ${p.rating||0}</span>${ps?.priceFrom?`<span>•</span><span>${tr('priceFrom')} ${money(ps.priceFrom)} ر.ع</span>`:''}</div><div style="margin-top:8px">${statusBadge(p.status)}</div></div><div class="pc-actions"><button class="pill-btn tiny" data-action="providerDetails" data-id="${p.id}">${tr('showDetails')}</button></div></article>`; }
function renderServices(){ return `<div class="section-head"><div><h2>${tr('services')}</h2><p>${tr('browseCategories')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="list">${S.categories.filter(c=>c.active).map(c=>`<section class="panel"><div class="section-head" style="margin-top:0"><div><h2>${c.icon} ${esc(loc(c))}</h2><p>${c.services.filter(s=>s.active).length} ${tr('service')}</p></div></div><div class="quick-grid grid">${c.services.filter(s=>s.active).map(s=>serviceTile(c,s)).join('')}</div></section>`).join('')}</div>`; }
function renderSearch(){ const filters=S.search||{}; const providers=filterProviders(filters); return `<div class="section-head"><div><h2>${tr('search')}</h2><p>${tr('nearby')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="panel"><div class="filters"><input class="input" id="fQuery" value="${esc(filters.q||'')}" placeholder="${tr('searchPlaceholder')}"><select class="select" id="fCat"><option value="">${tr('all')}</option>${S.categories.filter(c=>c.active).map(c=>`<option value="${c.id}" ${filters.cat===c.id?'selected':''}>${esc(loc(c))}</option>`).join('')}</select><select class="select" id="fGov"><option value="">${tr('all')}</option>${govOptions(filters.gov)}</select><select class="select" id="fStatus"><option value="">${tr('status')}</option><option value="available" ${filters.status==='available'?'selected':''}>${tr('available')}</option><option value="busy" ${filters.status==='busy'?'selected':''}>${tr('busy')}</option><option value="unavailable" ${filters.status==='unavailable'?'selected':''}>${tr('unavailable')}</option></select><select class="select" id="fSort"><option value="rating" ${filters.sort==='rating'?'selected':''}>${tr('rating')}</option><option value="featured" ${filters.sort==='featured'?'selected':''}>${tr('featured')}</option><option value="price" ${filters.sort==='price'?'selected':''}>${tr('priceFrom')}</option></select><button class="pill-btn primary" data-action="applySearch">${tr('search')}</button></div></div><div style="height:14px"></div>${providers.length?`<div class="provider-grid grid">${providers.map(providerCard).join('')}</div>`:`<div class="empty">${tr('noResults')}</div>`}`; }
function filterProviders(f={}){ let list=visibleProviders(); const q=String(f.q||'').trim().toLowerCase(); if(q){ list=list.filter(p=>{ const hay=[p.name,p.gov,p.wilayah,p.bio,...(p.areas||[])].join(' ').toLowerCase(); const sv=(p.services||[]).map(x=>loc(getSvc(x.catId,x.serviceId))).join(' ').toLowerCase(); return hay.includes(q)||sv.includes(q); }); } if(f.cat) list=list.filter(p=>(p.services||[]).some(s=>s.active&&s.catId===f.cat)); if(f.service) list=list.filter(p=>(p.services||[]).some(s=>s.active&&s.serviceId===f.service)); if(f.gov) list=list.filter(p=>p.gov===f.gov); if(f.status) list=list.filter(p=>p.status===f.status); if(f.sort==='price') list.sort((a,b)=>(providerPrimaryService(a)?.priceFrom||999)-(providerPrimaryService(b)?.priceFrom||999)); else if(f.sort==='featured') list.sort((a,b)=>(b.featured?1:0)-(a.featured?1:0)||(b.rating||0)-(a.rating||0)); else list.sort((a,b)=>(b.rating||0)-(a.rating||0)); return list; }
function renderFavorites(){ const favs=visibleProviders().filter(p=>S.favorites.includes(p.id)); return `<div class="section-head"><div><h2>${tr('favorites')}</h2><p>${tr('featuredProviders')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div>${favs.length?`<div class="provider-grid grid">${favs.map(providerCard).join('')}</div>`:`<div class="empty">${tr('emptyFav')}</div>`}`; }
function renderAccount(){ return `<div class="section-head"><div><h2>${tr('accountTitle')}</h2><p>${tr('supportText')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="panel"><div class="two-col"><div class="field"><label>${tr('userName')}</label><input class="input" id="userName" value="${esc(S.user.name)}"></div><div class="field"><label>${tr('phone')}</label><input class="input" id="userPhone" value="${esc(S.user.phone)}"></div><div class="field"><label>${tr('governorate')}</label><select class="select" id="userGov">${govOptions(S.user.gov)}</select></div><div class="field"><label>${tr('wilayah')}</label><select class="select" id="userWilayah">${wilOptions(S.user.gov,S.user.wilayah)}</select></div></div><div style="margin-top:14px"><button class="pill-btn primary" data-action="saveUser">${tr('saveAccount')}</button></div></div>`; }
function renderHelp(){ return `<div class="section-head"><div><h2>${tr('aboutTitle')}</h2><p>${tr('supportText')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="panel"><p class="muted" style="line-height:1.9">${tr('supportText')}</p></div>`; }
function openProviderDetails(id){ const p=getProvider(id); if(!p){toast(tr('providerNotFound'));return;} incStat(id,'views'); const ps=providerPrimaryService(p), cat=getCat(ps?.catId), svc=getSvc(ps?.catId,ps?.serviceId); const questions=['qAvailable','qPrice','qNearest','qCoverage','qBook','qPhoto']; openModal(`<div class="modal sheet"><div class="modal-head"><div class="modal-title">${esc(p.name)}</div><button class="close-btn" data-action="closeModal">×</button></div><div class="modal-body"><div style="display:flex;gap:14px;align-items:center"><div class="avatar" style="width:74px;height:74px;border-radius:26px">${p.avatar&&String(p.avatar).startsWith('data:')?`<img src="${p.avatar}">`:esc(p.avatar||initials(p.name))}</div><div><h2 style="margin:0 0 6px">${esc(p.name)} ${p.verified?'✓':''}</h2><div class="pc-meta"><span>${esc(loc(cat))}</span><span>•</span><span>${esc(loc(svc))}</span><span>•</span><span>${esc(p.wilayah)}</span><span>•</span><span>⭐ ${p.rating||0} (${p.reviews||0})</span></div><div style="margin-top:8px">${statusBadge(p.status)}</div></div></div><div style="height:16px"></div><p class="muted" style="line-height:1.8">${esc(p.bio||'')}</p><div class="three-col"><div class="card"><b>${tr('coverage')}</b><div class="muted">${esc((p.areas||[]).join('، '))}</div></div><div class="card"><b>${tr('workingHours')}</b><div class="muted">${esc(p.hours||'-')}</div></div><div class="card"><b>${tr('priceFrom')}</b><div class="muted">${ps?.priceFrom?money(ps.priceFrom)+' ر.ع':'-'}</div></div></div><div class="section-head"><div><h2>${tr('quickQuestions')}</h2></div></div><div class="quick-grid grid">${questions.map(q=>`<button class="tile" data-action="askWhatsapp" data-id="${p.id}" data-q="${q}"><span class="tile-icon">${q==='qBook'?'📅':q==='qPhoto'?'🖼️':'؟'}</span><span class="tile-title">${tr(q)}</span></button>`).join('')}</div><div style="height:14px"></div><div class="row-actions"><button class="pill-btn accent" data-action="directWhatsapp" data-id="${p.id}">${tr('whatsapp')}</button><button class="pill-btn" data-action="directCall" data-id="${p.id}">${tr('call')}</button><button class="pill-btn" data-action="bookingForm" data-id="${p.id}">${tr('bookTime')}</button><button class="pill-btn" data-action="fav" data-id="${p.id}">${isFav(p.id)?'♥':'♡'} ${tr('favorites')}</button></div><div style="height:10px"></div><button class="ghost-btn tiny" data-action="adminNoteUser" data-id="${p.id}">${tr('noteAdmin')}</button></div></div>`); }
function bookingForm(id){ const p=getProvider(id); if(!p)return; openModal(`<div class="modal"><div class="modal-head"><div class="modal-title">${tr('bookingTitle')}</div><button class="close-btn" data-action="closeModal">×</button></div><div class="modal-body"><div class="two-col"><div class="field"><label>${tr('customerName')}</label><input class="input" id="bName" value="${esc(S.user.name||'')}"></div><div class="field"><label>${tr('wilayah')}</label><input class="input" id="bWilayah" value="${esc(S.user.wilayah||'')}"></div><div class="field"><label>${tr('date')}</label><input class="input" id="bDate" type="date"></div><div class="field"><label>${tr('time')}</label><input class="input" id="bTime" type="time"></div></div><div class="field" style="margin-top:12px"><label>${tr('requestDetails')}</label><textarea class="textarea" id="bDetails"></textarea></div><div style="margin-top:14px"><button class="pill-btn accent" data-action="sendBookingWhatsapp" data-id="${p.id}">${tr('sendWhatsapp')}</button></div></div></div>`); }
function openWhatsAppQuestion(id,qkey){ const p=getProvider(id); if(!p)return; incStat(id,'whatsapp'); const msg = S.lang==='ar' ? `مرحبًا ${p.name}\n${tr(qkey)}\nالخدمة: ${loc(getSvc(providerPrimaryService(p)?.catId,providerPrimaryService(p)?.serviceId))}` : `Hello ${p.name}\n${tr(qkey)}\nService: ${loc(getSvc(providerPrimaryService(p)?.catId,providerPrimaryService(p)?.serviceId))}`; window.open(waUrl(p.phone,msg),'_blank'); }
function sendBookingWhatsapp(id){ const p=getProvider(id); if(!p)return; const msg = S.lang==='ar' ? `مرحبًا ${p.name}\nأرغب في ترتيب موعد.\nالاسم: ${val('bName')}\nالولاية: ${val('bWilayah')}\nالتاريخ: ${val('bDate')}\nالوقت: ${val('bTime')}\nالوصف: ${val('bDetails')}` : `Hello ${p.name}\nI would like to arrange an appointment.\nName: ${val('bName')}\nArea: ${val('bWilayah')}\nDate: ${val('bDate')}\nTime: ${val('bTime')}\nDetails: ${val('bDetails')}`; incStat(id,'whatsapp'); window.open(waUrl(p.phone,msg),'_blank'); closeModal(); }
function renderProviderApp(){ const p = S.currentProviderId ? getProvider(S.currentProviderId) : null; const tabs=['home','profile','services','availability','subscription','performance','support']; if(!p) return layout(`<div class="provider-shell"><div class="section-head"><div><h2>${tr('providerAccess')}</h2><p>${tr('providerLogin')}</p></div><button class="ghost-btn" data-action="nav" data-view="home">${tr('back')}</button></div><div class="panel"><button class="pill-btn primary" data-action="openProviderAccess">${tr('providerLogin')}</button></div></div>`,{noBottom:true}); return `<div class="topbar"><div class="container topbar-inner"><button class="brand" data-action="nav" data-view="provider" style="border:0;background:transparent"><span class="brand-mark">ف</span><span>${tr('provider')}</span></button><div class="top-actions"><button class="icon-btn" data-action="toggleLang">🌐</button><button class="pill-btn" data-action="providerLogout">${tr('back')}</button></div></div></div><main class="container provider-shell"><div class="side-layout"><aside class="side-nav">${tabs.map(t=>`<button data-action="providerTab" data-tab="${t}" class="${S.providerTab===t?'active':''}">${tabIcon(t)} ${tr('provider'+cap(t))}</button>`).join('')}</aside><section>${renderProviderTab(p)}</section></div></main>`; }
function tabIcon(t){ return {home:'⌂',profile:'◌',services:'▦',availability:'◷',subscription:'◇',performance:'◉',support:'✉'}[t]||'•'; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function renderProviderTab(p){ if(p.pending) return `<div class="panel"><h2>${tr('pendingReview')}</h2><p class="muted">${esc(p.name)}</p></div>`; const t=S.providerTab||'home'; if(t==='profile') return providerProfile(p); if(t==='services') return providerServices(p); if(t==='availability') return providerAvailability(p); if(t==='subscription') return providerSubscription(p); if(t==='performance') return providerPerformance(p); if(t==='support') return providerSupport(p); return providerHome(p); }
function providerHome(p){ return `<div class="section-head"><div><h2>${esc(p.name)}</h2><p>${tr('providerHome')}</p></div>${statusBadge(p.status)}</div><div class="admin-grid grid"><div class="card mini-stat"><span>${tr('views')}</span><b>${p.stats?.views||0}</b></div><div class="card mini-stat"><span>${tr('whatsappOpens')}</span><b>${p.stats?.whatsapp||0}</b></div><div class="card mini-stat"><span>${tr('calls')}</span><b>${p.stats?.calls||0}</b></div><div class="card mini-stat"><span>${tr('profileStrength')}</span><b>${profileStrength(p)}%</b><div class="progress"><i style="width:${profileStrength(p)}%"></i></div></div></div>`; }
function providerProfile(p){ return `<div class="panel"><h2>${tr('providerProfile')}</h2><div class="two-col"><div class="field"><label>${tr('fullName')}</label><input class="input" id="ppName" value="${esc(p.name)}"></div><div class="field"><label>${tr('phone')}</label><input class="input" id="ppPhone" value="${esc(p.phone)}"></div><div class="field"><label>${tr('governorate')}</label><select class="select" id="ppGov">${govOptions(p.gov)}</select></div><div class="field"><label>${tr('wilayah')}</label><select class="select" id="ppWilayah">${wilOptions(p.gov,p.wilayah)}</select></div><div class="field"><label>${tr('workingHours')}</label><input class="input" id="ppHours" value="${esc(p.hours||'')}"></div><div class="field"><label>${tr('coverage')}</label><input class="input" id="ppAreas" value="${esc((p.areas||[]).join('، '))}"></div></div><div class="field" style="margin-top:12px"><label>${tr('description')}</label><textarea class="textarea" id="ppBio">${esc(p.bio||'')}</textarea></div><div style="margin-top:14px"><button class="pill-btn primary" data-action="saveProviderProfile">${tr('save')}</button></div></div>`; }
function providerServices(p){ return `<div class="section-head"><div><h2>${tr('providerServices')}</h2></div><button class="pill-btn primary" data-action="providerServiceForm">${tr('addService')}</button></div><div class="list">${(p.services||[]).map(s=>providerServiceItem(p,s)).join('')||`<div class="empty">${tr('noResults')}</div>`}</div>`; }
function providerServiceItem(p,s){ const cat=getCat(s.catId), svc=getSvc(s.catId,s.serviceId); return `<div class="list-item"><div><b>${esc(loc(svc))}</b><div class="muted">${esc(loc(cat))} • ${tr('priceFrom')} ${money(s.priceFrom||0)} ر.ع • ${s.active?tr('activate'):tr('stop')}</div></div><div class="row-actions"><button class="ghost-btn tiny" data-action="providerServiceForm" data-id="${s.id}">${tr('edit')}</button><button class="ghost-btn tiny" data-action="toggleProviderService" data-id="${s.id}">${s.active?tr('stop'):tr('activate')}</button><button class="ghost-btn tiny" data-action="deleteProviderService" data-id="${s.id}">${tr('delete')}</button></div></div>`; }
function providerAvailability(p){ return `<div class="panel"><h2>${tr('providerAvailability')}</h2><div class="row-actions"><button class="pill-btn ${p.status==='available'?'ok':''}" data-action="setProviderStatus" data-status="available">${tr('available')}</button><button class="pill-btn ${p.status==='busy'?'warn':''}" data-action="setProviderStatus" data-status="busy">${tr('busy')}</button><button class="pill-btn ${p.status==='unavailable'?'danger':''}" data-action="setProviderStatus" data-status="unavailable">${tr('unavailable')}</button></div><div class="field" style="margin-top:16px"><label>${tr('workingHours')}</label><input class="input" id="paHours" value="${esc(p.hours||'')}"></div><div style="margin-top:14px"><button class="pill-btn primary" data-action="saveProviderHours">${tr('save')}</button></div></div>`; }
function providerSubscription(p){ const pkg=S.packages.find(x=>x.id===p.packageId); return `<div class="panel"><h2>${tr('providerSubscription')}</h2><div class="three-col"><div class="card"><b>${tr('package')}</b><div class="muted">${esc(loc(pkg)||'-')}</div></div><div class="card"><b>${tr('endDate')}</b><div class="muted">${esc(p.subscriptionEnd||'-')}</div></div><div class="card"><b>${tr('featured')}</b><div class="muted">${p.featured?tr('yes'):tr('no')}</div></div></div><div class="row-actions" style="margin-top:16px"><button class="pill-btn primary" data-action="providerUpgradeRequest">${tr('requestUpgrade')}</button><button class="pill-btn" data-action="providerFeaturedRequest">${tr('requestFeatured')}</button></div></div>`; }
function providerPerformance(p){ return `<div class="admin-grid grid"><div class="card mini-stat"><span>${tr('views')}</span><b>${p.stats?.views||0}</b></div><div class="card mini-stat"><span>${tr('whatsappOpens')}</span><b>${p.stats?.whatsapp||0}</b></div><div class="card mini-stat"><span>${tr('calls')}</span><b>${p.stats?.calls||0}</b></div><div class="card mini-stat"><span>${tr('rating')}</span><b>${p.rating||0}</b></div></div>`; }
function providerSupport(p){ return `<div class="panel"><h2>${tr('providerSupport')}</h2><div class="field"><label>${tr('sendNote')}</label><textarea class="textarea" id="supportNote"></textarea></div><button class="pill-btn primary" data-action="sendProviderSupport" style="margin-top:14px">${tr('sendNote')}</button></div>`; }
function renderAdmin(){ const tabs=['overview','providers','providerRequests','categoryAdmin','finance','settings','backup']; return `<div class="topbar"><div class="container topbar-inner"><button class="brand" style="border:0;background:transparent"><span class="brand-mark">ف</span><span>${tr('adminPanel')}</span></button><div class="top-actions"><button class="icon-btn" data-action="toggleLang">🌐</button><button class="pill-btn" data-action="adminLogout">${tr('back')}</button></div></div></div><main class="container admin-shell"><div class="side-layout"><aside class="side-nav">${tabs.map(t=>`<button data-action="adminTab" data-tab="${t}" class="${S.adminTab===t?'active':''}">${adminIcon(t)} ${tr(t)}</button>`).join('')}</aside><section>${renderAdminTab()}</section></div></main>`; }
function adminIcon(t){return {overview:'◉',providers:'◌',providerRequests:'◇',categoryAdmin:'▦',finance:'◈',settings:'⚙',backup:'⇅'}[t]||'•'}
function renderAdminTab(){ const t=S.adminTab||'overview'; if(t==='providers')return adminProviders(); if(t==='providerRequests')return adminRequests(); if(t==='categoryAdmin')return adminCategories(); if(t==='finance')return adminFinance(); if(t==='settings')return adminSettings(); if(t==='backup')return adminBackup(); return adminOverview(); }
function adminOverview(){ const active=S.providers.filter(p=>p.active).length, stopped=S.providers.filter(p=>!p.active).length, services=S.categories.flatMap(c=>c.services).filter(s=>s.active).length; return `<div class="section-head"><div><h2>${tr('overview')}</h2></div></div><div class="admin-grid grid"><div class="card mini-stat"><span>${tr('providers')}</span><b>${S.providers.length}</b></div><div class="card mini-stat"><span>${tr('activeProviders')}</span><b>${active}</b></div><div class="card mini-stat"><span>${tr('stoppedProviders')}</span><b>${stopped}</b></div><div class="card mini-stat"><span>${tr('activeServices')}</span><b>${services}</b></div></div><div class="panel" style="margin-top:14px"><h2>${tr('mostRequested')}</h2><div class="category-grid grid">${S.categories.slice(0,4).map(catTile).join('')}</div></div>`; }
function adminProviders(){ return `<div class="section-head"><div><h2>${tr('manageProviders')}</h2></div></div><div class="list">${S.providers.map(p=>`<div class="list-item"><div><b>${esc(p.name)} ${p.verified?'✓':''}</b><div class="muted">${esc(p.wilayah)} • ${statusBadge(p.status)} • ${p.active?tr('activate'):tr('stop')}</div></div><div class="row-actions"><button class="ghost-btn tiny" data-action="adminEditProvider" data-id="${p.id}">${tr('edit')}</button><button class="ghost-btn tiny" data-action="adminToggleProvider" data-id="${p.id}">${p.active?tr('stop'):tr('activate')}</button><button class="ghost-btn tiny" data-action="adminVerifyProvider" data-id="${p.id}">${tr('verify')}</button><button class="ghost-btn tiny" data-action="adminDeleteProvider" data-id="${p.id}">${tr('delete')}</button></div></div>`).join('')}</div>`; }
function adminRequests(){ return `<div class="section-head"><div><h2>${tr('providerRequests')}</h2></div></div><div class="list">${S.providerRequests.length?S.providerRequests.map(p=>`<div class="list-item"><div><b>${esc(p.name)}</b><div class="muted">${esc(p.phone)} • ${esc(p.wilayah)}</div></div><div class="row-actions"><button class="ghost-btn tiny" data-action="adminReviewRequest" data-id="${p.id}">${tr('review')}</button><button class="ghost-btn tiny" data-action="adminAcceptRequest" data-id="${p.id}">${tr('accept')}</button><button class="ghost-btn tiny" data-action="adminRejectRequest" data-id="${p.id}">${tr('reject')}</button></div></div>`).join(''):`<div class="empty">${tr('noResults')}</div>`}</div>`; }

function openModal(html){ document.getElementById('modalRoot').innerHTML=`<div class="modal-backdrop show" data-action="closeModalSoft">${html}</div>`; }
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }
function val(id){ return document.getElementById(id)?.value?.trim() || ''; }
function checked(id){ return !!document.getElementById(id)?.checked; }
function bindDynamic(){ document.getElementById('userGov')?.addEventListener('change',e=>{document.getElementById('userWilayah').innerHTML=wilOptions(e.target.value,'')}); document.getElementById('ppGov')?.addEventListener('change',e=>{document.getElementById('ppWilayah').innerHTML=wilOptions(e.target.value,'')}); document.getElementById('regGov')?.addEventListener('change',e=>{document.getElementById('regWilayah').innerHTML=wilOptions(e.target.value,'')}); }
function nav(view){ S.lastView=S.view; S.view=view; if(view==='search') S.search=S.search||{}; save(); render(); }
function applySearch(){ S.search={q:val('fQuery'),cat:val('fCat'),gov:val('fGov'),status:val('fStatus'),sort:val('fSort')||'rating'}; save(); render(); }
function download(name, content, type='text/plain'){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
function csv(rows){ return rows.map(r=>r.map(x=>`"${String(x??'').replace(/"/g,'""')}"`).join(',')).join('\n'); }

function serviceForm(catId,id){ const c=getCat(catId); const s=id?c.services.find(x=>x.id===id):{id:'',icon:'▫️',ar:'',en:'',active:true}; openModal(`<div class="modal"><div class="modal-head"><div class="modal-title">${id?tr('edit'):tr('addSubService')}</div><button class="close-btn" data-action="closeModal">×</button></div><div class="modal-body"><div class="two-col"><div class="field"><label>AR</label><input class="input" id="svcAr" value="${esc(s.ar)}"></div><div class="field"><label>EN</label><input class="input" id="svcEn" value="${esc(s.en)}"></div><div class="field"><label>Icon</label><input class="input" id="svcIcon" value="${esc(s.icon)}"></div></div><button class="pill-btn primary" data-action="saveSvc" data-cat="${catId}" data-id="${esc(id||'')}" style="margin-top:14px">${tr('save')}</button></div></div>`); }

function onClick(e){ const el=e.target.closest('[data-action]'); if(!el)return; const a=el.dataset.action; if(a==='closeModalSoft'&&e.target!==el)return; const id=el.dataset.id; try{
 if(a==='nav')nav(el.dataset.view); else if(a==='toggleLang')setLang(S.lang==='ar'?'en':'ar'); else if(a==='openAccount')nav('myAccount'); else if(a==='openProviderAccess')openProviderAccess(); else if(a==='openAdminLogin')openAdminLogin(); else if(a==='closeModal'||a==='closeModalSoft')closeModal(); else if(a==='homeSearch'){S.search={q:val('homeSearchInput'),sort:'rating'};nav('search')} else if(a==='category'){S.search={cat:el.dataset.cat,sort:'rating'};nav('search')} else if(a==='serviceSearch'){S.search={cat:el.dataset.cat,service:el.dataset.service,sort:'rating'};nav('search')} else if(a==='applySearch')applySearch();
 else if(a==='fav'){ const i=S.favorites.indexOf(id); if(i>-1){S.favorites.splice(i,1);toast(tr('favoriteRemoved'))} else {S.favorites.push(id);toast(tr('favoriteSaved'))} save(); render(); }
 else if(a==='providerDetails')openProviderDetails(id); else if(a==='askWhatsapp')openWhatsAppQuestion(id,el.dataset.q); else if(a==='directWhatsapp'){const p=getProvider(id); incStat(id,'whatsapp'); window.open(waUrl(p.phone, S.lang==='ar'?`مرحبًا ${p.name}`:`Hello ${p.name}`),'_blank');} else if(a==='directCall'){const p=getProvider(id); incStat(id,'calls'); location.href=callUrl(p.phone);} else if(a==='bookingForm')bookingForm(id); else if(a==='sendBookingWhatsapp')sendBookingWhatsapp(id); else if(a==='adminNoteUser'){S.supportNotes.push({id:uid('n'),providerId:id,date:nowISO(),note:'ملاحظة من مستخدم'}); save(); toast(tr('sent'));}
 else if(a==='saveUser'){S.user={name:val('userName'),phone:val('userPhone'),gov:val('userGov'),wilayah:val('userWilayah')}; save(); toast(tr('save'));}
 else if(a==='switchProviderAccess'){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); el.classList.add('active'); document.getElementById('providerAccessBody').innerHTML=el.dataset.mode==='register'?providerRegisterForm():providerLoginForm(); bindDynamic();}
 else if(a==='providerLogin'){ const p=S.providers.find(x=>phoneClean(x.phone)===phoneClean(val('loginPhone'))) || S.providerRequests.find(x=>phoneClean(x.phone)===phoneClean(val('loginPhone'))); if(p && val('loginOtp')===OTP_CODE){S.currentProviderId=p.id;S.view='provider';S.providerTab='home';save();closeModal();render();} else toast(tr('providerNotFound'));}
 else if(a==='providerRegister'){ if(val('regOtp')!==OTP_CODE){toast(tr('otp'));return;} const [catId,serviceId]=val('regService').split('|'); const p={id:uid('req'),name:val('regName'),phone:val('regPhone'),gov:val('regGov'),wilayah:val('regWilayah'),areas:[val('regWilayah')],bio:val('regBio'),hours:'',status:'unavailable',active:false,verified:false,featured:false,packageId:'intro',subscriptionEnd:'',avatar:initials(val('regName')),rating:0,reviews:0,adminNote:'',pending:true,stats:{views:0,whatsapp:0,calls:0},services:[{id:uid('ps'),catId,serviceId,priceFrom:Number(val('regPrice')||0),active:true,areas:[val('regWilayah')]}]}; S.providerRequests.push(p); S.currentProviderId=p.id; S.view='provider'; save(); closeModal(); render(); }
 else if(a==='providerLogout'){S.currentProviderId=null;S.view='home';save();render();} else if(a==='providerTab'){S.providerTab=el.dataset.tab;save();render();} else if(a==='saveProviderProfile'){const p=getProvider(S.currentProviderId); Object.assign(p,{name:val('ppName'),phone:val('ppPhone'),gov:val('ppGov'),wilayah:val('ppWilayah'),hours:val('ppHours'),areas:val('ppAreas').split(/[،,]/).map(x=>x.trim()).filter(Boolean),bio:val('ppBio')}); save(); toast(tr('save')); render();}
