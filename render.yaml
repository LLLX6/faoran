services:
  - type: web
    name: faoran
    runtime: python
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/bootstrap
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: FORAN_DB_PATH
        value: /var/data/foran.sqlite3
      - key: FORAN_UPLOAD_DIR
        value: /var/data/uploads
      - key: FORAN_ADMIN_CODE
        sync: false
    disk:
      name: faoran-data
      mountPath: /var/data
      sizeGB: 1
