services:
  - type: web
    name: faoran
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/bootstrap
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: FORAN_ADMIN_CODE
        value: "0000"
