services:
  - type: web
    name: khadamati-app-api
    repo: https://github.com/LLLX6/Khadamati
    runtime: python
    plan: free
    branch: main
    autoDeployTrigger: commit
    renderSubdomainPolicy: enabled
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/bootstrap
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: KHADAMATI_ENV
        value: production
      - key: KHADAMATI_PUBLIC_URL
        value: https://lllx6.github.io/Khadamati/
      - key: KHADAMATI_ALLOWED_ORIGINS
        value: https://lllx6.github.io
      - key: KHADAMATI_ADMIN_CODE
        sync: false
      - key: KHADAMATI_OTP_PEPPER
        sync: false
      - key: KHADAMATI_PAYMENT_WEBHOOK_SECRET
        sync: false
